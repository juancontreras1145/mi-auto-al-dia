name: ci

on:
  pull_request:
  push:
    branches:
      - master
      - main

permissions:
  contents: read

jobs:
  android:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Configurar Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Configurar Android SDK
        uses: android-actions/setup-android@v3

      - name: Instalar SDK necesario
        run: sdkmanager 'platforms;android-35' 'build-tools;35.0.0'

      - name: Configurar Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'

      - name: Verificar archivos sensibles accidentales
        run: bash scripts/verify-no-secrets.sh

      - name: Lint release
        run: gradle :app:lintRelease --no-daemon

      - name: Compilar debug
        run: gradle :app:assembleDebug --no-daemon

<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<title>Mi Auto al Día</title>
<style>
:root{
  --bg:#030405; --panel:#0b0c10; --panel2:#11131a; --card:#12141b;
  --line:#252936; --line2:#343a4d; --text:#f7f8fb; --muted:#9aa3b3;
  --green:#22c55e; --yellow:#f59e0b; --red:#ef4444; --blue:#38bdf8; --purple:#8b5cf6;
  --radius:24px; --shadow:0 20px 60px rgba(0,0,0,.42);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;height:100%;background:#000;color:var(--text);font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif}
body{overscroll-behavior:none}.app{min-height:100%;padding:calc(env(safe-area-inset-top) + 22px) 16px calc(env(safe-area-inset-bottom) + 88px);max-width:760px;margin:0 auto;background:radial-gradient(circle at 50% 0%,rgba(56,189,248,.12),transparent 30%),linear-gradient(180deg,#040607,#000)}
.screen{display:none}.screen.active{display:block}.top{display:flex;align-items:flex-start;justify-content:space-between;gap:14px;margin-bottom:14px}.brand{font-size:34px;line-height:1;font-weight:1000;letter-spacing:-1.8px;margin:0;background:linear-gradient(135deg,#22d3ee,#8b5cf6);-webkit-background-clip:text;color:transparent}.sub{margin:7px 0 0;color:var(--muted);font-size:14px;line-height:1.25;font-weight:650}.gear,.back{width:48px;height:48px;border-radius:18px;border:1px solid var(--line2);background:linear-gradient(180deg,#1a1d26,#0c0e14);color:#fff;font-size:22px;font-weight:900}.vehicle-pill{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:12px 14px;border:1px solid var(--line);border-radius:20px;background:linear-gradient(180deg,#11131a,#090a0e);box-shadow:var(--shadow);margin-bottom:12px}.vehicle-pill b{font-size:18px}.vehicle-pill span{font-size:13px;color:var(--muted);font-weight:800}.km-badge{font-size:18px!important;color:#fff!important;background:#171b25;border:1px solid var(--line2);border-radius:16px;padding:9px 12px;white-space:nowrap}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:10px 0 12px}.mini-stat{border:1px solid var(--line);border-radius:18px;background:linear-gradient(180deg,#12141b,#090a0d);padding:11px 10px;min-height:70px}.mini-stat small{display:block;color:var(--muted);font-size:11px;font-weight:950;text-transform:uppercase;letter-spacing:.5px}.mini-stat strong{display:block;font-size:25px;line-height:1.05;margin-top:5px}.panel{border:1px solid var(--line);background:linear-gradient(180deg,rgba(255,255,255,.055),rgba(255,255,255,.025));border-radius:var(--radius);box-shadow:var(--shadow);padding:15px;margin:12px 0}.panel.slim{padding:12px}.panel-head{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:10px}.panel-head h2{margin:0;font-size:21px;letter-spacing:-.5px}.panel-head button{height:36px;border-radius:14px;padding:0 12px;background:#151821;border:1px solid var(--line2);color:#fff;font-weight:900}.muted{color:var(--muted)}.tiny{font-size:12px;color:var(--muted);font-weight:750;line-height:1.35}.action-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:12px 0}.btn{min-height:56px;border:0;border-radius:22px;color:#fff;font-weight:1000;font-size:16px;background:#151821;border:1px solid var(--line2);box-shadow:0 14px 38px rgba(0,0,0,.28)}.btn.primary{background:linear-gradient(135deg,#22c55e,#0891b2);border:0}.btn.blue{background:linear-gradient(135deg,#3b82f6,#7c3aed);border:0}.btn.red{background:linear-gradient(135deg,#fb3b68,#e11d48);border:0}.btn.full{width:100%;margin-top:10px}.btn.small{min-height:42px;border-radius:16px;font-size:13px}.list{display:grid;gap:8px}.row{display:flex;align-items:center;justify-content:space-between;gap:10px;border:1px solid var(--line);border-radius:18px;background:rgba(255,255,255,.045);padding:12px}.row-main{min-width:0}.row b{display:block;font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.row small{display:block;color:var(--muted);font-weight:750;margin-top:3px;line-height:1.25}.status{display:inline-flex;align-items:center;gap:6px;border-radius:999px;padding:7px 10px;font-size:11px;font-weight:1000;white-space:nowrap}.status.ok{background:rgba(34,197,94,.15);color:#50fa95;border:1px solid rgba(34,197,94,.35)}.status.warning{background:rgba(245,158,11,.16);color:#fbbf24;border:1px solid rgba(245,158,11,.38)}.status.critical{background:rgba(239,68,68,.16);color:#fb7185;border:1px solid rgba(239,68,68,.38)}.status.unknown{background:rgba(148,163,184,.13);color:#cbd5e1;border:1px solid rgba(148,163,184,.28)}
.radar-mini{height:170px;border:1px solid var(--line);border-radius:28px;background:radial-gradient(circle at 50% 52%,rgba(34,211,238,.16),transparent 25%),linear-gradient(180deg,#0d1018,#050608);position:relative;overflow:hidden;margin-bottom:10px}.radar-mini:before,.radar-mini:after{content:"";position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);border:1px solid rgba(255,255,255,.08);border-radius:50%}.radar-mini:before{width:126px;height:126px}.radar-mini:after{width:78px;height:78px}.score{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:70px;height:70px;border-radius:50%;display:grid;place-items:center;background:linear-gradient(135deg,#22d3ee,#8b5cf6);font-size:25px;font-weight:1000;box-shadow:0 0 34px rgba(34,211,238,.25)}.zone{position:absolute;display:flex;align-items:center;gap:6px;font-size:11px;font-weight:1000;color:#dbe4f0}.zone i{width:12px;height:12px;border-radius:50%;display:block}.z1{left:18px;top:22px}.z2{right:22px;top:28px}.z3{left:24px;bottom:24px}.z4{right:26px;bottom:24px}.z5{left:50%;top:10px;transform:translateX(-50%)}
.pills{display:flex;gap:8px;overflow-x:auto;padding:2px 0 8px;scrollbar-width:none}.pills::-webkit-scrollbar{display:none}.pill{height:42px;border-radius:16px;border:1px solid var(--line2);background:#0b0d13;color:#9aa3b3;padding:0 14px;font-weight:1000;white-space:nowrap}.pill.active{background:#fff;color:#020308;border-color:#fff}.mapbox{border:1px solid var(--line);border-radius:24px;background:#090a0d;padding:10px;overflow:hidden}.maparea{position:relative;border-radius:18px;overflow:hidden;background:#e5e7eb}.maparea img{display:block;width:100%;height:auto;min-height:210px;object-fit:cover}.dot{position:absolute;width:22px;height:22px;border-radius:50%;transform:translate(-50%,-50%);border:4px solid #e5e7eb;box-shadow:0 10px 22px rgba(0,0,0,.4);z-index:2}.dot:after{content:"";position:absolute;inset:4px;border-radius:50%;background:currentColor}.dot.ok{color:var(--green)}.dot.warning{color:var(--yellow)}.dot.critical{color:var(--red)}.dot.unknown{color:#94a3b8}.label{position:absolute;left:50%;top:calc(100% + 5px);transform:translateX(-50%);max-width:96px;background:rgba(0,0,0,.76);border:1px solid rgba(255,255,255,.16);color:#fff;font-size:10px;font-weight:950;border-radius:999px;padding:4px 7px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.modal{position:fixed;inset:0;background:rgba(0,0,0,.78);z-index:20;display:flex;align-items:flex-start;justify-content:center;padding:calc(env(safe-area-inset-top) + 16px) 12px 16px}.modal-card{width:min(760px,100%);max-height:calc(100vh - 28px);overflow:auto;background:#050607;border:1px solid var(--line2);border-radius:28px;box-shadow:0 30px 100px rgba(0,0,0,.8);padding:16px}.modal-head{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:12px}.modal-head h2{margin:0;font-size:22px}.close{width:46px;height:46px;border-radius:18px;border:1px solid var(--line2);background:#171a22;color:#fff;font-size:24px}.map-large{width:880px;max-width:none}.map-scroll{overflow:auto;max-height:58vh;border:1px solid var(--line);border-radius:22px;background:#000;padding:10px;touch-action:pan-x pan-y}.map-large img{min-height:420px}.map-large .dot{width:30px;height:30px;border-width:5px}.map-large .label{font-size:11px;max-width:130px}.form{display:grid;gap:10px}.field label{display:block;font-size:12px;color:var(--muted);font-weight:950;margin:0 0 6px;text-transform:uppercase;letter-spacing:.5px}.input,select,textarea{width:100%;min-height:52px;border-radius:18px;border:1px solid var(--line2);background:#0f1118;color:#fff;font-size:16px;padding:0 14px;outline:0}textarea{min-height:86px;padding-top:12px;resize:vertical}.form2{display:grid;grid-template-columns:1fr 1fr;gap:10px}.empty{border:1px dashed var(--line2);border-radius:18px;padding:18px;text-align:center;color:var(--muted);font-weight:800}.nav{position:fixed;left:50%;bottom:calc(env(safe-area-inset-bottom) + 10px);transform:translateX(-50%);width:min(680px,calc(100% - 24px));height:64px;background:rgba(4,5,7,.92);backdrop-filter:blur(18px);border:1px solid rgba(255,255,255,.09);border-radius:24px;display:grid;grid-template-columns:repeat(5,1fr);padding:8px;z-index:15;box-shadow:0 20px 60px rgba(0,0,0,.65)}.nav button{border:0;background:transparent;color:#8b94a5;font-weight:1000;border-radius:16px}.nav button.active{background:linear-gradient(135deg,#38bdf8,#8b5cf6);color:#fff}.toast{position:fixed;left:50%;bottom:95px;transform:translateX(-50%);background:#fff;color:#000;border-radius:999px;padding:10px 14px;font-weight:1000;z-index:30;display:none}@media(max-width:420px){.app{padding-left:14px;padding-right:14px}.brand{font-size:31px}.grid3{gap:7px}.mini-stat{padding:10px 8px}.mini-stat strong{font-size:22px}.panel{padding:13px}.row{padding:11px}.action-grid{gap:9px}.btn{min-height:52px}.maparea img{min-height:185px}.nav{height:62px}.nav button{font-size:12px}.form2{grid-template-columns:1fr}.radar-mini{height:154px}}
</style>
</head>
<body>
<div class="app">
  <section id="home" class="screen active"></section>
  <section id="parts" class="screen"></section>
  <section id="docs" class="screen"></section>
  <section id="history" class="screen"></section>
  <section id="settings" class="screen"></section>
</div>
<nav class="nav" id="nav">
  <button onclick="go('home')">Inicio</button>
  <button onclick="go('parts')">Partes</button>
  <button onclick="go('docs')">Docs</button>
  <button onclick="go('history')">Historial</button>
  <button onclick="go('settings')">Ajustes</button>
</nav>
<div id="modalRoot"></div><div id="toast" class="toast"></div>
<script>
const APP_VERSION='1.7'; // v1.7: compacta, menos info, utilidad directa
const STORAGE_KEY='miAutoAlDiaData.v1';
const DEFAULT_IMG='vehicle_default.jpg';
const ENGINE_IMG='engine_bay_diagram.png';
const MAP_CATEGORIES=['Motor','Ruedas','Frenos','Luces','Exterior','Otros'];
let data=loadData();
let view='home';
let cat='Motor';
let modal=null;
let dragId=null, dragMoved=false;

function uid(){return (crypto.randomUUID?crypto.randomUUID():Date.now().toString(36)+Math.random().toString(36).slice(2));}
function today(){return new Date().toISOString().slice(0,10)}
function money(n){return '$'+Math.round(Number(n)||0).toLocaleString('es-CL')}
function kmFmt(n){n=Number(n)||0; return n>=1000?Math.round(n/1000)+'K':String(n)}
function esc(s){return String(s??'').replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]))}
function addMonths(dateStr,m){if(!dateStr||!m)return null; const d=new Date(dateStr+'T12:00:00'); if(isNaN(d))return null; d.setMonth(d.getMonth()+Number(m)); return d.toISOString().slice(0,10)}
function daysUntil(dateStr){if(!dateStr)return null; const a=new Date(today()+'T00:00:00'); const b=new Date(dateStr+'T00:00:00'); if(isNaN(b))return null; return Math.ceil((b-a)/86400000)}
function categoryGroup(c){c=String(c||'Otros').toLowerCase(); if(c.includes('document'))return 'Documentos'; if(c.includes('motor')||c.includes('eléctr')||c.includes('electr')||c.includes('bater'))return 'Motor'; if(c.includes('rueda')||c.includes('neum')||c.includes('aline'))return 'Ruedas'; if(c.includes('freno'))return 'Frenos'; if(c.includes('luz')||c.includes('luces'))return 'Luces'; if(c.includes('carro')||c.includes('exterior')||c.includes('limpia'))return 'Exterior'; return 'Otros'}
function isDoc(i){return !!i.document || categoryGroup(i.category)==='Documentos'}
function itemById(id){return data.items.find(i=>i.id===id)}
function recordsOf(id){return data.records.filter(r=>r.itemId===id).sort((a,b)=>String(b.date||'').localeCompare(String(a.date||'')) || String(b.createdAt||'').localeCompare(String(a.createdAt||'')))}
function lastRecord(id){return recordsOf(id)[0]||null}
function defaultItems(){return [
{id:'oil',name:'Aceite motor',category:'Motor',x:21,y:60,intervalKm:10000,intervalMonths:12,points:{motor:{x:13,y:63}}},
{id:'oil_filter',name:'Filtro de aceite',category:'Motor',x:30,y:55,intervalKm:10000,intervalMonths:12,points:{}},
{id:'air_filter',name:'Filtro de aire',category:'Motor',x:25,y:54,intervalKm:15000,intervalMonths:12,points:{}},
{id:'spark_plugs',name:'Bujías',category:'Motor',x:34,y:52,intervalKm:40000,intervalMonths:36,points:{motor:{x:42,y:31}}},
{id:'timing_belt',name:'Correa distribución',category:'Motor',x:19,y:48,intervalKm:60000,intervalMonths:60,points:{motor:{x:15,y:36}}},
{id:'coolant',name:'Refrigerante',category:'Motor',x:26,y:65,intervalKm:40000,intervalMonths:24,points:{motor:{x:86,y:53}}},
{id:'brake_fluid',name:'Líquido de frenos',category:'Motor',x:78,y:42,intervalKm:40000,intervalMonths:24,points:{motor:{x:78,y:42}}},
{id:'battery',name:'Batería',category:'Motor',x:37,y:63,intervalKm:null,intervalMonths:36,points:{}},
{id:'tires',name:'Neumáticos',category:'Ruedas',x:53,y:81,intervalKm:60000,intervalMonths:60,points:{}},
{id:'alignment',name:'Alineación y balanceo',category:'Ruedas',x:45,y:70,intervalKm:10000,intervalMonths:6,points:{}},
{id:'front_brakes',name:'Frenos delanteros',category:'Frenos',x:44,y:80,intervalKm:80000,intervalMonths:12,points:{}},
{id:'rear_brakes',name:'Frenos traseros',category:'Frenos',x:84,y:54,intervalKm:20000,intervalMonths:12,points:{}},
{id:'lights_front',name:'Luces delanteras',category:'Luces',x:13,y:52,intervalKm:null,intervalMonths:6,points:{}},
{id:'lights_rear',name:'Luces traseras',category:'Luces',x:86,y:20,intervalKm:null,intervalMonths:6,points:{}},
{id:'wipers',name:'Limpiaparabrisas',category:'Exterior',x:38,y:27,intervalKm:null,intervalMonths:12,points:{}},
{id:'driver_license',name:'Licencia de conducir',category:'Documentos',intervalKm:null,intervalMonths:null,document:true,points:{}},
{id:'driving_permit',name:'Permiso de circulación',category:'Documentos',intervalKm:null,intervalMonths:null,document:true,points:{}},
{id:'technical_review',name:'Revisión técnica',category:'Documentos',intervalKm:null,intervalMonths:null,document:true,points:{}},
{id:'soap',name:'SOAP',category:'Documentos',intervalKm:null,intervalMonths:null,document:true,points:{}}
]}
function defaultData(){return {app:'Mi Auto al Día',version:1,exportedAt:new Date().toISOString(),vehicle:{name:'Fiat Punto',year:'2017',plate:'',currentKm:0,image:DEFAULT_IMG},items:defaultItems(),records:[],settings:{appTitle:'Mi Auto al Día',warnDays:30,warnKm:1000}}}
function migrate(d){const base=defaultData(); d=d||{}; d.vehicle={...base.vehicle,...(d.vehicle||{})}; d.settings={...base.settings,...(d.settings||{})}; d.items=Array.isArray(d.items)?d.items:[]; d.records=Array.isArray(d.records)?d.records:[]; const byId=Object.fromEntries(d.items.map(i=>[i.id,i])); base.items.forEach(b=>{ if(!byId[b.id]) d.items.push({...b}); }); d.items=d.items.map(i=>{i.points=i.points||{}; if(categoryGroup(i.category)==='Documentos'){i.document=true;i.intervalKm=null;i.intervalMonths=null;} if(i.id==='driving_permit' && i.name==='Permiso de conducción') i.name='Permiso de circulación'; return i}); return {...base,...d};}
function loadData(){try{const raw=localStorage.getItem(STORAGE_KEY); return raw?migrate(JSON.parse(raw)):defaultData()}catch(e){return defaultData()}}
function save(){data.exportedAt=new Date().toISOString(); localStorage.setItem(STORAGE_KEY,JSON.stringify(data));}

function statusOf(item){const rec=lastRecord(item.id); const warnDays=Number(data.settings.warnDays||30); const warnKm=Number(data.settings.warnKm||1000); if(isDoc(item)){ if(!rec||!rec.expiryDate)return {state:'unknown',label:'Sin dato',detail:'Registra vencimiento'}; const d=daysUntil(rec.expiryDate); if(d===null)return {state:'unknown',label:'Sin dato',detail:'Fecha inválida'}; if(d<0)return {state:'critical',label:'Vencido',detail:`Hace ${Math.abs(d)} días`}; if(d<=warnDays)return {state:'warning',label:'Pronto',detail:`Faltan ${d} días`}; return {state:'ok',label:'Al día',detail:`Vence ${fmtDate(rec.expiryDate)}`}; }
 if(!rec)return {state:'unknown',label:'Sin dato',detail:'Sin registro'};
 let dueDate=item.intervalMonths?addMonths(rec.date,item.intervalMonths):null; let days=dueDate?daysUntil(dueDate):null; let kmLeft=null;
 if(item.intervalKm && Number(rec.km)>0 && Number(data.vehicle.currentKm)>0) kmLeft=Number(item.intervalKm)-(Number(data.vehicle.currentKm)-Number(rec.km));
 let crit=false,warn=false,details=[];
 if(days!==null){ if(days<0)crit=true; else if(days<=warnDays)warn=true; details.push(days<0?`fecha vencida ${Math.abs(days)}d`:`${days}d`); }
 if(kmLeft!==null){ if(kmLeft<=0)crit=true; else if(kmLeft<=warnKm)warn=true; details.push(kmLeft<=0?`km vencido ${Math.abs(kmLeft)}`:`${Math.round(kmLeft).toLocaleString('es-CL')} km`); }
 if(crit)return {state:'critical',label:'Crítico',detail:details.join(' · ')||'Vencido'};
 if(warn)return {state:'warning',label:'Pronto',detail:details.join(' · ')||'Próximo'};
 return {state:'ok',label:'Al día',detail:details.join(' · ')||`Último ${fmtDate(rec.date)}`};}
function fmtDate(d){if(!d)return 'sin fecha'; const [y,m,day]=String(d).split('-'); return day&&m?`${day}-${m}-${y}`:String(d)}
function health(){const non=data.items.filter(i=>!isDoc(i)); const known=non.map(statusOf).filter(s=>s.state!=='unknown'); if(!known.length)return 0; const score=known.reduce((a,s)=>a+(s.state==='ok'?100:s.state==='warning'?60:s.state==='critical'?15:0),0)/known.length; return Math.round(score)}
function counts(){const mechanical=data.items.filter(i=>!isDoc(i)).map(statusOf); const docs=data.items.filter(isDoc).map(statusOf); return {critical:[...mechanical,...docs].filter(s=>s.state==='critical').length,warning:[...mechanical,...docs].filter(s=>s.state==='warning').length,ok:[...mechanical,...docs].filter(s=>s.state==='ok').length,unknown:[...mechanical,...docs].filter(s=>s.state==='unknown').length,docsUnknown:docs.filter(s=>s.state==='unknown').length}}
function ranked(){return data.items.map(i=>({item:i,st:statusOf(i),rec:lastRecord(i.id)})).sort((a,b)=>({critical:0,warning:1,unknown:2,ok:3}[a.st.state]-{critical:0,warning:1,unknown:2,ok:3}[b.st.state]));}
function stateColor(st){return st==='ok'?'var(--green)':st==='warning'?'var(--yellow)':st==='critical'?'var(--red)':'#94a3b8'}
function dotClass(st){return st==='ok'?'ok':st==='warning'?'warning':st==='critical'?'critical':'unknown'}

function go(s){view=s; document.querySelectorAll('.screen').forEach(x=>x.classList.toggle('active',x.id===s)); render();}
function render(){document.querySelectorAll('#nav button').forEach((b,i)=>b.classList.toggle('active',['home','parts','docs','history','settings'][i]===view)); if(view==='home')renderHome(); if(view==='parts')renderParts(); if(view==='docs')renderDocs(); if(view==='history')renderHistory(); if(view==='settings')renderSettings();}
function renderHome(){const c=counts(); const top=ranked().filter(x=>x.st.state!=='ok').slice(0,3); const z=zoneSummary(); document.getElementById('home').innerHTML=`
<div class="top"><div><h1 class="brand">Mi Auto al Día</h1><p class="sub">Compacto: qué revisar, qué vence y qué registrar.</p></div><button class="gear" onclick="go('settings')">⚙</button></div>
<div class="vehicle-pill"><div><b>${esc(data.vehicle.name||'Vehículo')} ${esc(data.vehicle.year||'')}</b><span>${esc(data.vehicle.plate||'Sin patente')}</span></div><span class="km-badge">${kmFmt(data.vehicle.currentKm)} km</span></div>
<div class="grid3"><div class="mini-stat"><small>Crítico</small><strong>${c.critical}</strong></div><div class="mini-stat"><small>Pronto</small><strong>${c.warning}</strong></div><div class="mini-stat"><small>Salud</small><strong>${health()}</strong></div></div>
<div class="panel slim"><div class="panel-head"><h2>Radar útil</h2><button onclick="go('parts')">Ver</button></div><div class="radar-mini"><div class="score">${health()}</div>${z.map((a,i)=>`<div class="zone z${i+1}"><i style="background:${stateColor(a.state)}"></i>${a.name}</div>`).join('')}</div><p class="tiny">Solo resume zonas mecánicas. Documentos van aparte por vencimiento.</p></div>
<div class="panel"><div class="panel-head"><h2>Atención</h2><button onclick="go('history')">Historial</button></div><div class="list">${top.length?top.map(x=>rowItem(x.item,x.st,false)).join(''):'<div class="empty">Todo lo registrado está al día.</div>'}</div></div>
<div class="action-grid"><button class="btn primary" onclick="openRegister()">Registrar</button><button class="btn blue" onclick="updateKm()">Actualizar km</button><button class="btn" onclick="go('docs')">Documentos</button><button class="btn" onclick="openMap()">Mapa visual</button></div>`;}
function zoneSummary(){return MAP_CATEGORIES.slice(0,5).map(name=>{const arr=data.items.filter(i=>!isDoc(i)&&categoryGroup(i.category)===name).map(statusOf); const state=arr.some(s=>s.state==='critical')?'critical':arr.some(s=>s.state==='warning')?'warning':arr.some(s=>s.state==='unknown')?'unknown':'ok'; return {name,state};});}
function rowItem(item,st,click=true){const rec=lastRecord(item.id); return `<div class="row" ${click?`onclick="openItem('${item.id}')"`:''}><div class="row-main"><b>${esc(item.name)}</b><small>${esc(item.category||'')} · ${st.detail}${rec?` · ${fmtDate(rec.date)}`:''}</small></div><span class="status ${st.state}">${st.label}</span></div>`}
function renderParts(){const items=data.items.filter(i=>!isDoc(i)&&categoryGroup(i.category)===cat); document.getElementById('parts').innerHTML=`<div class="top"><div><h1 class="brand">Partes</h1><p class="sub">Elige una zona. Sin “todos” para no llenar la pantalla.</p></div><button class="back" onclick="go('home')">←</button></div><div class="panel slim"><div class="pills">${MAP_CATEGORIES.map(c=>`<button class="pill ${cat===c?'active':''}" onclick="cat='${c}';renderParts()">${c}</button>`).join('')}</div><div class="tiny">${items.length} partes visibles</div></div><div class="list">${items.map(i=>rowItem(i,statusOf(i))).join('')||'<div class="empty">Sin partes en esta zona.</div>'}</div><div class="action-grid"><button class="btn primary" onclick="openRegister('${cat}')">Registrar ${cat}</button><button class="btn" onclick="openMap('${cat}')">Mapa ${cat}</button></div>`;}
function renderDocs(){const docs=data.items.filter(isDoc); document.getElementById('docs').innerHTML=`<div class="top"><div><h1 class="brand">Documentos</h1><p class="sub">Por fecha otorgada y fecha de vencimiento. No por km.</p></div><button class="back" onclick="go('home')">←</button></div><div class="list">${docs.map(d=>rowDoc(d)).join('')}</div>`;}
function rowDoc(item){const st=statusOf(item); const rec=lastRecord(item.id); return `<div class="row" onclick="openDoc('${item.id}')"><div class="row-main"><b>${esc(item.name)}</b><small>${rec&&rec.expiryDate?`Vence ${fmtDate(rec.expiryDate)}`:'Sin vencimiento registrado'}${rec&&rec.issueDate?` · Otorgado ${fmtDate(rec.issueDate)}`:''}</small></div><span class="status ${st.state}">${st.label}</span></div>`}
function renderHistory(){const rows=[...data.records].sort((a,b)=>String(b.date||'').localeCompare(String(a.date||''))||String(b.createdAt||'').localeCompare(String(a.createdAt||''))); document.getElementById('history').innerHTML=`<div class="top"><div><h1 class="brand">Historial</h1><p class="sub">Últimos registros. Compacto.</p></div><button class="back" onclick="go('home')">←</button></div><div class="panel slim"><button class="btn small full" onclick="exportCsv()">Exportar CSV</button></div><div class="list">${rows.map(r=>{const i=itemById(r.itemId)||{}; return `<div class="row"><div class="row-main"><b>${esc(i.name||'Registro')}</b><small>${fmtDate(r.date)} · ${r.km?Number(r.km).toLocaleString('es-CL')+' km':'sin km'} · ${money(r.cost)}${r.expiryDate?` · vence ${fmtDate(r.expiryDate)}`:''}</small></div><span class="status ${statusOf(i).state}">${esc(i.category||'')}</span></div>`}).join('')||'<div class="empty">Sin historial.</div>'}</div>`}
function renderSettings(){document.getElementById('settings').innerHTML=`<div class="top"><div><h1 class="brand">Ajustes</h1><p class="sub">Vehículo, respaldo y actualización.</p></div><button class="back" onclick="go('home')">←</button></div><div class="panel"><h2>Vehículo</h2><div class="form"><div class="field"><label>Nombre</label><input class="input" id="vehName" value="${esc(data.vehicle.name||'')}"></div><div class="form2"><div class="field"><label>Año</label><input class="input" id="vehYear" value="${esc(data.vehicle.year||'')}"></div><div class="field"><label>Patente</label><input class="input" id="vehPlate" value="${esc(data.vehicle.plate||'')}"></div></div><div class="field"><label>Kilometraje</label><input class="input" type="number" id="vehKm" value="${Number(data.vehicle.currentKm)||''}"></div><button class="btn primary" onclick="saveVehicle()">Guardar vehículo</button></div></div><div class="panel"><h2>Respaldo</h2><div class="action-grid"><button class="btn" onclick="exportJson()">Guardar JSON</button><button class="btn" onclick="shareJson()">Compartir JSON</button></div><input type="file" id="importFile" accept="application/json,.json" style="display:none" onchange="importJsonFile(event)"><button class="btn full" onclick="document.getElementById('importFile').click()">Importar JSON</button></div><div class="panel"><h2>Actualizaciones</h2><p class="tiny">Versión instalada: ${nativeVersion()}</p><button class="btn full" onclick="checkUpdates()">Buscar actualizaciones</button><p id="updateBox" class="tiny"></p></div>`}

function openRegister(category){const items=data.items.filter(i=>!isDoc(i) && (!category || categoryGroup(i.category)===category)); modal=`register:${category||''}`; document.getElementById('modalRoot').innerHTML=`<div class="modal"><div class="modal-card"><div class="modal-head"><h2>Registrar mantención</h2><button class="close" onclick="closeModal()">×</button></div><div class="form"><div class="field"><label>Parte</label><select id="regItem">${items.map(i=>`<option value="${i.id}">${esc(i.name)} · ${esc(categoryGroup(i.category))}</option>`).join('')}</select></div><div class="form2"><div class="field"><label>Fecha</label><input class="input" type="date" id="regDate" value="${today()}"></div><div class="field"><label>Kilometraje</label><input class="input" type="number" id="regKm" value="${Number(data.vehicle.currentKm)||''}"></div></div><div class="form2"><div class="field"><label>Costo</label><input class="input" type="number" id="regCost" placeholder="0"></div><div class="field"><label>Taller / lugar</label><input class="input" id="regShop" placeholder="Opcional"></div></div><div class="field"><label>Notas</label><textarea id="regNotes" placeholder="Ej: 5W40 C3, marca, observaciones"></textarea></div><button class="btn primary" onclick="saveRecord()">Guardar</button></div></div></div>`}
function saveRecord(){const itemId=document.getElementById('regItem').value; const rec={id:uid(),itemId,date:document.getElementById('regDate').value||today(),km:Number(document.getElementById('regKm').value)||0,cost:Number(document.getElementById('regCost').value)||0,shop:document.getElementById('regShop').value.trim(),notes:document.getElementById('regNotes').value.trim(),createdAt:new Date().toISOString()}; data.records.unshift(rec); if(rec.km>data.vehicle.currentKm)data.vehicle.currentKm=rec.km; save(); closeModal(); toast('Mantención guardada'); render();}
function openDoc(id){const item=itemById(id); const rec=lastRecord(id)||{}; document.getElementById('modalRoot').innerHTML=`<div class="modal"><div class="modal-card"><div class="modal-head"><h2>${esc(item.name)}</h2><button class="close" onclick="closeModal()">×</button></div><div class="form"><div class="form2"><div class="field"><label>Fecha otorgada</label><input class="input" type="date" id="docIssue" value="${esc(rec.issueDate||rec.date||today())}"></div><div class="field"><label>Fecha vencimiento</label><input class="input" type="date" id="docExpiry" value="${esc(rec.expiryDate||'')}"></div></div><div class="field"><label>Lugar / nota corta</label><input class="input" id="docShop" value="${esc(rec.shop||'')}" placeholder="Opcional"></div><button class="btn primary" onclick="saveDoc('${id}')">Guardar documento</button></div></div></div>`}
function saveDoc(id){const issue=document.getElementById('docIssue').value||today(); const expiry=document.getElementById('docExpiry').value; data.records.unshift({id:uid(),itemId:id,date:issue,km:0,cost:0,shop:document.getElementById('docShop').value.trim(),notes:'',issueDate:issue,expiryDate:expiry,createdAt:new Date().toISOString()}); save(); closeModal(); toast('Documento guardado'); render();}
function openItem(id){const item=itemById(id); const st=statusOf(item); const rec=lastRecord(id); document.getElementById('modalRoot').innerHTML=`<div class="modal"><div class="modal-card"><div class="modal-head"><h2>${esc(item.name)}</h2><button class="close" onclick="closeModal()">×</button></div><div class="panel slim"><span class="status ${st.state}">${st.label}</span><p class="tiny">${st.detail}</p>${rec?`<p class="tiny">Último: ${fmtDate(rec.date)} · ${rec.km?Number(rec.km).toLocaleString('es-CL')+' km':'sin km'} · ${money(rec.cost)}</p>`:''}</div><button class="btn primary full" onclick="closeModal();openRegister('${categoryGroup(item.category)}')">Registrar cambio</button><button class="btn full" onclick="editItem('${id}')">Editar parte</button></div></div>`}
function editItem(id){const item=itemById(id); const name=prompt('Nombre',item.name); if(name===null)return; item.name=name.trim()||item.name; const category=prompt('Categoría',item.category||'Motor'); if(category===null)return; item.category=category.trim()||item.category; save(); closeModal(); render();}
function openMap(category){if(category)cat=category; const visible=data.items.filter(i=>!isDoc(i)&&categoryGroup(i.category)===cat); document.getElementById('modalRoot').innerHTML=`<div class="modal"><div class="modal-card"><div class="modal-head"><h2>Mapa ${cat}</h2><button class="close" onclick="closeModal()">×</button></div><div class="pills">${MAP_CATEGORIES.map(c=>`<button class="pill ${cat===c?'active':''}" onclick="cat='${c}';openMap(c)">${c}</button>`).join('')}</div><p class="tiny">Solo se muestran puntos de la categoría seleccionada. Toca un punto para revisar. Mantén y arrastra para mover.</p><div class="map-scroll"><div id="bigMap" class="maparea map-large"><img src="${cat==='Motor'?ENGINE_IMG:(data.vehicle.image||DEFAULT_IMG)}">${visible.map(renderDot).join('')}</div></div><button class="btn full" onclick="addPointPrompt()">Agregar punto en esta categoría</button></div></div>`; setTimeout(bindBigMap,0)}
function pointFor(i){const key=cat==='Motor'?'motor':'vehicle'; const p=i.points&&i.points[key]; if(p&&typeof p.x==='number')return p; return {x:Number(i.x||50),y:Number(i.y||50)}}
function setPoint(i,x,y){const key=cat==='Motor'?'motor':'vehicle'; i.points=i.points||{}; i.points[key]={x,y}; if(key==='vehicle'){i.x=x;i.y=y}}
function renderDot(i){const st=statusOf(i).state; const p=pointFor(i); return `<div class="dot ${dotClass(st)}" data-id="${i.id}" style="left:${p.x}%;top:${p.y}%"><span class="label">${esc(i.name)}</span></div>`}
function bindBigMap(){const map=document.getElementById('bigMap'); if(!map)return; const pos=(e)=>{const r=map.getBoundingClientRect(); return {x:Math.max(2,Math.min(98,(e.clientX-r.left)/r.width*100)),y:Math.max(2,Math.min(98,(e.clientY-r.top)/r.height*100))}}; map.querySelectorAll('.dot').forEach(dot=>{dot.addEventListener('click',e=>{e.stopPropagation();openItem(dot.dataset.id)}); dot.addEventListener('pointerdown',e=>{e.stopPropagation(); dragId=dot.dataset.id; dragMoved=false; try{dot.setPointerCapture(e.pointerId)}catch(_){} }); dot.addEventListener('pointermove',e=>{if(dragId!==dot.dataset.id)return; const item=itemById(dragId); const p=pos(e); setPoint(item,p.x,p.y); dot.style.left=p.x+'%'; dot.style.top=p.y+'%'; dragMoved=true;}); dot.addEventListener('pointerup',e=>{if(dragId){save(); if(dragMoved)toast('Punto movido'); dragId=null; dragMoved=false;}});});}
function addPointPrompt(){const name=prompt('Nombre de la parte'); if(!name)return; const item={id:uid(),name:name.trim(),category:cat,x:50,y:50,intervalKm:null,intervalMonths:null,points:{},document:false}; data.items.push(item); save(); openMap(cat); toast('Punto creado al centro. Arrástralo.');}
function closeModal(){document.getElementById('modalRoot').innerHTML=''; modal=null;}
function updateKm(){const km=prompt('Kilometraje actual',data.vehicle.currentKm||''); if(km===null)return; data.vehicle.currentKm=Number(km)||0; save(); toast('Km actualizado'); render();}
function saveVehicle(){data.vehicle.name=document.getElementById('vehName').value.trim()||'Vehículo'; data.vehicle.year=document.getElementById('vehYear').value.trim(); data.vehicle.plate=document.getElementById('vehPlate').value.trim(); data.vehicle.currentKm=Number(document.getElementById('vehKm').value)||0; save(); toast('Vehículo guardado'); renderSettings();}
function exportDataObj(){return {...data,exportedAt:new Date().toISOString()}}
function exportJson(){const json=JSON.stringify(exportDataObj(),null,2); const name='mi-auto-respaldo-'+today()+'.json'; if(window.AndroidBridge?.saveJson)AndroidBridge.saveJson(name,json); else download(name,json,'application/json')}
function shareJson(){const json=JSON.stringify(exportDataObj(),null,2); const name='mi-auto-respaldo-'+today()+'.json'; if(window.AndroidBridge?.shareJson)AndroidBridge.shareJson(name,json); else download(name,json,'application/json')}
function importJsonFile(e){const f=e.target.files&&e.target.files[0]; if(!f)return; const r=new FileReader(); r.onload=()=>{try{const obj=JSON.parse(r.result); if(!obj.vehicle||!Array.isArray(obj.items))throw new Error('JSON inválido'); data=migrate(obj); save(); toast('JSON importado'); go('home');}catch(err){alert('No se pudo importar: '+err.message)}}; r.readAsText(f)}
function csvCell(v){return '"'+String(v??'').replace(/"/g,'""')+'"'}
function exportCsv(){const header=['fecha','elemento','categoria','km','costo','taller','notas','vence']; const rows=data.records.map(r=>{const i=itemById(r.itemId)||{}; return [r.date,i.name||'',i.category||'',r.km||'',r.cost||'',r.shop||'',r.notes||'',r.expiryDate||''].map(csvCell).join(',')}); const csv=header.join(',')+'\n'+rows.join('\n'); if(window.AndroidBridge?.saveCsv)AndroidBridge.saveCsv('mi-auto-historial-'+today()+'.csv',csv); else download('mi-auto-historial.csv',csv,'text/csv')}
function download(name,content,type){const a=document.createElement('a'); a.href=URL.createObjectURL(new Blob([content],{type})); a.download=name; a.click(); setTimeout(()=>URL.revokeObjectURL(a.href),1000)}
function checkUpdates(){const box=document.getElementById('updateBox'); if(box)box.textContent='Buscando...'; if(window.AndroidBridge?.checkGithubUpdates)AndroidBridge.checkGithubUpdates(); else if(box)box.textContent='Disponible solo en APK'}
window.onNativeUpdateResult=(res)=>{const box=document.getElementById('updateBox'); if(!box)return; if(!res||!res.ok){box.textContent='Error: '+(res?.error||'sin respuesta');return;} box.innerHTML=`Última: <b>${esc(res.tagName)}</b>. <button class="btn small" onclick="AndroidBridge.openUpdateUrl('${esc(res.apkUrl||res.htmlUrl)}')">Abrir</button>`}
function nativeVersion(){try{return window.AndroidBridge?.getVersionName?.()||APP_VERSION}catch(e){return APP_VERSION}}
function toast(msg){const t=document.getElementById('toast'); t.textContent=msg; t.style.display='block'; clearTimeout(window.__toast); window.__toast=setTimeout(()=>t.style.display='none',1800)}
function appBack(){if(document.getElementById('modalRoot').innerHTML){closeModal();return 'handled'} if(view!=='home'){go('home');return 'handled'} return 'handled'}
window.appBack=appBack;
render();
</script>
</body>
</html>

function alertCard(a,compact=false){return `<div class="alert-card ${colorClass(a.color)}"><div class="alert-icon">${a.icon}</div><div><h3>${a.title}</h3><div class="status">${a.status}</div><p>${a.category} · ${a.detail}</p><div class="progress"><i style="width:${a.progress||60}%"></i></div></div><button class="review">${compact?a.statusShort:'Revisar'} ›</button></div>`}
function renderHome(){const v=state.vehicle,s=state.summary;$('#app').innerHTML=`${topbar('',true)}<section class="hero card"><div><h1>${v.name}</h1><div class="sub">${v.year} · ${v.plate}</div><p class="label" style="margin-top:28px">Kilometraje actual</p><div class="km">${fmt(v.km)} km</div><div class="muted">Actualizado hoy, ${v.updated}</div></div><div class="car-art"><div class="car-glow"></div><div class="car-body"></div><div class="tail-light"></div><div class="wheel w1"></div><div class="wheel w2"></div></div></section>${kpis()}<section class="health card"><div><h2>Salud general</h2><div class="donut"><span>${s.health}%<em>Buena</em></span></div></div><div><div class="chart-title">Evolución de salud</div><div class="chart-sub">Últimos 6 meses · basado en mantenciones y documentos</div><div class="line-chart"><svg viewBox="0 0 320 110" preserveAspectRatio="none"><defs><linearGradient id="fill" x1="0" x2="0" y1="0" y2="1"><stop stop-color="#28e7c7" stop-opacity=".35"/><stop offset="1" stop-color="#28e7c7" stop-opacity="0"/></linearGradient></defs><path d="M12 80 C42 65,52 62,70 64 C95 68,98 35,120 42 C150 52,147 90,174 76 C196 65,205 55,226 62 C249 68,255 32,280 32 C300 34,302 20,314 16 L314 104 L12 104 Z" fill="url(#fill)"/><path d="M12 80 C42 65,52 62,70 64 C95 68,98 35,120 42 C150 52,147 90,174 76 C196 65,205 55,226 62 C249 68,255 32,280 32 C300 34,302 20,314 16" fill="none" stroke="#28e7c7" stroke-width="4" stroke-linecap="round"/><g fill="#28e7c7"><circle cx="12" cy="80" r="4"/><circle cx="70" cy="64" r="4"/><circle cx="120" cy="42" r="4"/><circle cx="174" cy="76" r="4"/><circle cx="226" cy="62" r="4"/><circle cx="280" cy="32" r="4"/><circle cx="314" cy="16" r="5"/></g><g fill="#aeb9ce" font-size="12" font-weight="800"><text x="22" y="107">MAY</text><text x="75" y="107">JUN</text><text x="132" y="107">JUL</text><text x="186" y="107">AGO</text><text x="245" y="107">SEP</text><text x="292" y="107">OCT</text></g></svg></div></div><div class="legend"><span class="teal"><i class="bullet"></i><b>${s.ok}</b> al día</span><span class="yellow"><i class="bullet"></i><b>${s.upcoming}</b> próximas</span><span class="red"><i class="bullet"></i><b>${s.expired}</b> vencidas</span><span class="gray"><i class="bullet"></i><b>${s.unknown}</b> sin dato</span></div></section><div class="metrics"><div class="metric"><div class="mi">▦</div><span class="muted">Próximo servicio</span><b>${s.nextDays}</b><span>días</span></div><div class="metric"><div class="mi">⌁</div><span class="muted">Km. estimado</span><b>${fmt(s.kmRemaining)} km</b><span>restantes</span></div><div class="metric"><div class="mi">▤</div><span class="muted">Eventos</span><b>${s.eventsMonth}</b><span>este mes</span></div><div class="metric"><div class="mi">⌘</div><span class="muted">Total servicios</span><b>${s.services}</b><span>historial</span></div></div><div class="section-head"><h2>Alertas importantes</h2><a onclick="go('maintenance')">Ver todas ›</a></div><div class="alert-list">${state.alerts.slice(0,3).map(a=>alertCard(a)).join('')}</div>`}
function renderMaintenance(){const s=state.summary;$('#app').innerHTML=`${topbar('MANTENCIONES')}${kpis()}<div class="section-head" style="margin-top:6px"><h2>Sistemas del vehículo</h2></div><div class="subtitle">Toca una categoría para ver el detalle</div><div class="category-grid">${state.categories.map(c=>`<button class="cat ${colorClass(c.color)}"><div class="cat-top"><span class="cat-ico">${c.icon}</span><span class="cat-count">${c.count}</span></div><h3>${c.name}</h3><p>${c.note}</p></button>`).join('')}</div><div class="chips"><button class="chip active">Todos</button><button class="chip">Pendientes ·</button><button class="chip">Próximas ·</button><button class="chip">OK ·</button></div><div class="section-head"><h2>Requieren atención</h2><a>Ver todas ›</a></div><div class="alert-list">${[state.alerts[0],state.alerts[1],state.alerts[3]].map(a=>alertCard(a,true)).join('')}</div>`}
function renderAgenda(){const s=state.summary;$('#app').innerHTML=`${topbar('AGENDA')}<div class="agenda-summary"><div class="mini teal"><div class="top"><span>Hoy</span><span>▦</span></div><b>1</b><span>evento</span></div><div class="mini yellow"><div class="top"><span>Próximos<br>7 días</span><span>◷</span></div><b>3</b><span>eventos</span></div><div class="mini teal"><div class="top"><span>Este mes</span><span>▦</span></div><b>${s.eventsMonth}</b><span>eventos</span></div><div class="mini gray"><div class="top"><span>Docs</span><span>▤</span></div><b>4</b><span>por vencer</span></div></div><div class="date-strip"><div class="date-pill active"><span>MIÉ</span><b>24</b><span>JUN</span></div><div class="date-pill"><span>JUE</span><b>25</b><span>JUN</span></div><div class="date-pill"><span>VIE</span><b>26</b><span>JUN</span></div><div class="date-pill"><span>DOM</span><b>28</b><span>JUN</span></div><div class="date-pill"><span>JUE</span><b>31</b><span>JUL</span></div></div><section class="highlight card"><div class="alert-icon teal">🛢️</div><div><div class="label teal">Siguiente hito</div><h2 style="margin:8px 0 4px">Aceite motor</h2><div class="muted">Mantención · Motor</div><b>En 4 días · Vence 28/06/2026</b></div><span class="badge yellow">Próxima</span></section><div class="section-head"><h2>Próximos eventos</h2><a>Ver todos ›</a></div><div class="alert-list">${state.agenda.map(e=>`<div class="event-card ${colorClass(e.color)}"><div class="date-block"><span>${e.date.split(' ')[0]}</span><b>${e.date.split(' ')[1]}</b></div><div class="alert-icon">${e.icon}</div><div><h3 style="margin:0 0 3px">${e.title}</h3><div class="muted">${e.type}</div><p style="margin:3px 0;color:${e.color==='red'?'var(--red)':'var(--muted2)'}">${e.detail}</p></div><span class="badge">${e.badge}</span></div>`).join('')}</div><div class="section-head"><h2>Documentos</h2><a>Ver todos ›</a></div><div class="docs-grid">${state.docs.map(d=>`<div class="doc"><div class="doc-ico">${d.icon}</div><div><b>${d.title}</b><div class="muted">${d.date}</div></div><span class="badge ${colorClass(d.color)}">${d.status}</span></div>`).join('')}</div>`}
function renderAdd(){ $('#app').innerHTML=`${topbar('AGREGAR')}<section class="card empty-page"><h1>Agregar registro</h1><p class="muted">Crea una mantención, documento, gasto o recordatorio.</p><button class="primary">＋ Nueva mantención</button><br><button class="primary">＋ Nuevo documento</button></section>` }
function renderMore(){ $('#app').innerHTML=`${topbar('MÁS')}<section class="card empty-page"><h1>Más opciones</h1><p class="muted">Reportes, exportar datos, configuración, respaldo y actualizaciones.</p><button class="primary" onclick="checkUpdates()">Buscar actualización</button></section>` }
function go(page){state.page=page;$$('.nav-item').forEach(n=>n.classList.toggle('active',n.dataset.page===page));render()}
function render(){ if(state.page==='home')renderHome(); else if(state.page==='maintenance')renderMaintenance(); else if(state.page==='agenda')renderAgenda(); else if(state.page==='add')renderAdd(); else renderMore(); window.scrollTo(0,0)}
function checkUpdates(){try{if(window.AndroidBridge&&AndroidBridge.checkGithubUpdates)AndroidBridge.checkGithubUpdates();else alert('Actualizaciones disponibles desde GitHub Releases.')}catch(e){alert('No se pudo consultar actualización.')}}
window.appBack=()=>{ if(state.page==='home') return 'exit'; go('home'); return 'handled'; };
$$('[data-page]').forEach(b=>b.addEventListener('click',()=>go(b.dataset.page)));
render();
</script>
</body>
</html>

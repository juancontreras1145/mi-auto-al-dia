<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<title>Mi Auto al Día</title>
<style>
:root{
  --bg:#030712;
  --bg2:#02060b;
  --panel:#08111b;
  --panel2:#0c1724;
  --card:#101b2a;
  --card2:#0b1420;
  --line:rgba(92,114,148,.16);
  --line2:rgba(126,151,189,.28);
  --text:#edf6ff;
  --muted:#88a0bb;
  --teal:#2af5d0;
  --teal2:#19d6ff;
  --green:#22e38a;
  --purple:#a56bff;
  --pink:#ff5ecb;
  --warning:#ffc84d;
  --danger:#ff6b7a;
  --radius:24px;
  --shadow:0 18px 48px rgba(0,0,0,.45);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;height:100%;background:linear-gradient(180deg,#02050a,#000);color:var(--text);font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif}
body{overscroll-behavior:none}
.app{min-height:100%;padding:calc(env(safe-area-inset-top) + 18px) 16px calc(env(safe-area-inset-bottom) + 96px);max-width:760px;margin:0 auto;background:radial-gradient(circle at 50% 0%,rgba(37,99,235,.17),transparent 25%),radial-gradient(circle at 82% 8%,rgba(42,245,208,.12),transparent 20%),linear-gradient(180deg,#02050a,#020812 46%,#000)}
.screen{display:none}.screen.active{display:block}
.top{display:flex;align-items:flex-start;justify-content:space-between;gap:14px;margin-bottom:14px}
.brand{font-size:32px;line-height:1;font-weight:1000;letter-spacing:-1.4px;margin:0;color:#fff}
.brand small{display:block;margin-top:5px;font-size:13px;letter-spacing:.18em;color:var(--teal);text-transform:uppercase}
.sub{margin:7px 0 0;color:var(--muted);font-size:13px;line-height:1.35;font-weight:650;max-width:34ch}
.gear,.back,.icon-btn{width:44px;height:44px;border-radius:16px;border:1px solid var(--line2);background:linear-gradient(180deg,#101a28,#070c13);color:#fff;font-size:20px;font-weight:900;box-shadow:var(--shadow)}
.panel{border:1px solid var(--line);background:linear-gradient(180deg,rgba(13,22,34,.98),rgba(7,13,20,.98));border-radius:var(--radius);box-shadow:var(--shadow);padding:14px;margin:12px 0;position:relative;overflow:hidden}
.panel:before{content:"";position:absolute;inset:0;background:linear-gradient(180deg,rgba(255,255,255,.04),transparent 30%);pointer-events:none}
.panel.slim{padding:12px}
.panel-head{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:10px;position:relative;z-index:1}
.panel-head h2,.panel h2{margin:0;font-size:18px;letter-spacing:-.4px}
.panel-head button{height:34px;border-radius:12px;padding:0 12px;background:#121d2b;border:1px solid var(--line2);color:#d9efff;font-weight:900}
.muted{color:var(--muted)}.tiny{font-size:12px;color:var(--muted);font-weight:700;line-height:1.4}
.vehicle-hero{padding:18px;border-radius:28px;background:linear-gradient(135deg,rgba(7,19,36,.98),rgba(5,12,22,.98));border:1px solid rgba(73,109,173,.2);box-shadow:var(--shadow);position:relative;overflow:hidden}
.vehicle-hero:before{content:"";position:absolute;inset:auto -20% -40% -20%;height:80%;background:radial-gradient(circle,rgba(25,214,255,.18),transparent 55%);pointer-events:none}
.vehicle-hero .edit-mini{position:absolute;right:16px;top:14px;color:#b9d1e9;font-size:14px}
.hero-head{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;position:relative;z-index:1}
.hero-title{font-size:19px;font-weight:900;line-height:1.12}
.hero-meta{display:flex;align-items:center;gap:8px;margin-top:7px;color:var(--muted);font-size:13px;font-weight:800}
.dot-live{width:9px;height:9px;border-radius:50%;background:var(--green);box-shadow:0 0 14px rgba(34,227,138,.8)}
.plate-chip{display:inline-flex;align-items:center;padding:8px 12px;border-radius:14px;background:#111b29;border:1px solid rgba(145,167,201,.16);font-weight:900;font-size:13px;color:#fff;margin-top:10px}
.car-stage{position:relative;height:180px;display:flex;align-items:center;justify-content:center;margin-top:10px;z-index:1}
.car-stage img{max-width:86%;max-height:150px;object-fit:contain;filter:drop-shadow(0 22px 35px rgba(0,0,0,.55))}
.orbit{position:absolute;bottom:20px;left:50%;transform:translateX(-50%);width:82%;height:18px;border-radius:999px;background:linear-gradient(90deg,#6d5cff,#20e0ff,#2af5d0);filter:blur(.2px);box-shadow:0 0 26px rgba(42,245,208,.36)}
.stats-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px}
.info-card{padding:14px;border-radius:20px;border:1px solid var(--line);background:linear-gradient(180deg,#0e1826,#08111b)}
.info-card .label{position:static;transform:none;display:block;background:none;border:0;padding:0;font-size:12px;color:var(--muted);font-weight:800;letter-spacing:.02em;white-space:normal;overflow:visible}
.info-card .value{font-size:18px;font-weight:1000;margin-top:8px;line-height:1.05}
.info-card .subv{font-size:12px;color:#bcd2e8;margin-top:5px;font-weight:700}
.health-wrap{display:grid;grid-template-columns:150px 1fr;gap:14px;align-items:center}
.gauge{width:150px;height:150px;border-radius:50%;padding:12px;background:conic-gradient(var(--teal) calc(var(--value)*1%),rgba(255,255,255,.08) 0);display:grid;place-items:center;box-shadow:0 0 30px rgba(42,245,208,.12)}
.gauge-inner{width:100%;height:100%;border-radius:50%;display:grid;place-items:center;background:radial-gradient(circle at 50% 35%,#112031,#09111b 60%,#071018)}
.gauge-inner b{display:block;font-size:22px;line-height:1;font-weight:1000}
.gauge-inner span{display:block;text-align:center;font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);font-weight:900}
.gauge-inner em{display:block;margin-top:5px;font-style:normal;color:var(--green);font-size:13px;font-weight:1000}
.bullets{display:grid;grid-template-columns:1fr;gap:8px}
.bullet{display:flex;align-items:center;gap:10px;font-weight:800;color:#dbe9f7;font-size:14px}
.bullet i{width:8px;height:8px;border-radius:50%;display:block;box-shadow:0 0 10px currentColor}
.quick-title,.section-title{font-size:13px;letter-spacing:.06em;text-transform:uppercase;color:#a6bbd3;margin:16px 0 10px;font-weight:900}
.quick-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.quick-btn{background:linear-gradient(180deg,#121d2b,#0a111a);border:1px solid var(--line);border-radius:18px;min-height:88px;color:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:9px;font-weight:800;font-size:14px;box-shadow:var(--shadow)}
.quick-btn span.ico{font-size:24px;line-height:1}
.quick-btn small{font-size:12px;color:#d9e7f5;line-height:1.1}
.list{display:grid;gap:10px}
.row,.maint-row{display:flex;align-items:center;justify-content:space-between;gap:12px;border:1px solid var(--line);border-radius:22px;background:linear-gradient(180deg,#0f1826,#09111b);padding:14px;box-shadow:0 10px 24px rgba(0,0,0,.22)}
.maint-left,.row-main{display:flex;align-items:center;gap:12px;min-width:0}
.icon-badge{width:46px;height:46px;border-radius:16px;display:grid;place-items:center;font-size:21px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);flex:none;box-shadow:inset 0 0 0 1px rgba(255,255,255,.02),0 0 18px rgba(0,0,0,.15)}
.icon-badge.circle{border-radius:50%}
.row-main b,.maint-title{display:block;font-size:16px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:900}
.row-main small,.maint-sub{display:block;color:var(--muted);font-weight:700;margin-top:4px;line-height:1.28;font-size:12px}
.due-stack{text-align:right;display:grid;gap:3px;flex:none}
.due-stack b{font-size:16px;line-height:1;color:#fff}
.due-stack small{font-size:12px;color:#8deec2;font-weight:800}
.status{display:inline-flex;align-items:center;gap:6px;border-radius:999px;padding:7px 10px;font-size:11px;font-weight:1000;white-space:nowrap}
.status.ok{background:rgba(34,227,138,.12);color:#71ffb6;border:1px solid rgba(34,227,138,.32)}.status.warning{background:rgba(255,200,77,.15);color:#ffd976;border:1px solid rgba(255,200,77,.34)}.status.critical{background:rgba(255,107,122,.14);color:#ff95a0;border:1px solid rgba(255,107,122,.34)}.status.unknown{background:rgba(148,163,184,.14);color:#dbe4ee;border:1px solid rgba(148,163,184,.28)}
.maintenance-tabs,.pills{display:flex;gap:8px;overflow-x:auto;padding:2px 0 8px;scrollbar-width:none}.maintenance-tabs::-webkit-scrollbar,.pills::-webkit-scrollbar{display:none}
.seg,.pill{height:38px;border-radius:14px;border:1px solid var(--line2);background:#0b1320;color:#91a8c2;padding:0 14px;font-weight:900;white-space:nowrap}
.seg.active,.pill.active{background:transparent;color:var(--teal);border-color:transparent;box-shadow:inset 0 -2px 0 var(--teal)}
.big-number{font-size:36px;font-weight:1000;line-height:1}
.split-two{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.progress-wrap{margin:10px 0 2px}
.progressbar{height:12px;border-radius:999px;background:#07131f;border:1px solid rgba(255,255,255,.06);overflow:hidden}
.progressbar span{display:block;height:100%;width:var(--pct,50%);background:linear-gradient(90deg,#27c7ff,#2af5d0);border-radius:999px}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px}
.detail-stat{border:1px solid var(--line);background:linear-gradient(180deg,#0f1825,#08111a);border-radius:18px;padding:14px;min-height:96px}
.detail-stat label{display:block;font-size:11px;color:var(--muted);font-weight:900;text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px}
.detail-stat b{display:block;font-size:20px;line-height:1.05}
.detail-stat small{display:block;margin-top:6px;color:#c8daec;font-weight:700;line-height:1.35}
.note-card{border:1px solid var(--line);background:linear-gradient(180deg,#0e1825,#09131d);border-radius:18px;padding:14px;margin-top:12px}
.calendar-card{padding:14px;border-radius:24px;border:1px solid var(--line);background:linear-gradient(180deg,#0e1826,#071018);box-shadow:var(--shadow)}
.calendar-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.calendar-title{font-size:18px;font-weight:900}
.calendar-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:8px}
.dayname{font-size:11px;color:#7f98b4;text-align:center;font-weight:900;text-transform:uppercase}
.day{aspect-ratio:1;border-radius:14px;background:#0c1521;border:1px solid rgba(255,255,255,.04);display:grid;place-items:center;font-size:13px;color:#dce9f7;font-weight:800}
.day.muted{opacity:.34}.day.today{background:linear-gradient(135deg,#19d6ff,#2af5d0);color:#03111c;border:0}.day.event{box-shadow:inset 0 0 0 2px rgba(42,245,208,.4)}
.stat-wrap{display:grid;grid-template-columns:1fr 1fr;gap:14px;align-items:start}
.donut{width:180px;height:180px;border-radius:50%;padding:14px;background:conic-gradient(#2af5d0 0 45%, #8b7bff 45% 65%, #19d6ff 65% 80%, #ffc84d 80% 90%, #ff9fe7 90% 100%);display:grid;place-items:center;margin:0 auto}
.donut-inner{width:100%;height:100%;border-radius:50%;background:radial-gradient(circle at 50% 35%,#122233,#08111a 60%,#071018);display:grid;place-items:center;text-align:center}
.donut-inner b{display:block;font-size:28px;line-height:1}
.donut-inner span{display:block;color:var(--muted);font-size:12px;font-weight:900;text-transform:uppercase;margin-top:4px}
.legend{display:grid;gap:10px;margin-top:6px}.legend-row{display:flex;align-items:center;justify-content:space-between;gap:10px;font-size:14px;font-weight:800}.legend-left{display:flex;align-items:center;gap:10px}.legend-row i{width:10px;height:10px;border-radius:50%;display:block}
.toggle-list{display:grid;gap:10px}.toggle-row{display:flex;align-items:center;justify-content:space-between;gap:14px;border:1px solid var(--line);background:linear-gradient(180deg,#101b28,#0a121b);padding:14px;border-radius:18px}.toggle-copy b{display:block;font-size:15px}.toggle-copy small{display:block;margin-top:4px;color:var(--muted);font-size:12px;font-weight:700}.switch{width:48px;height:28px;border-radius:999px;background:#163245;padding:3px;position:relative;border:1px solid rgba(255,255,255,.08);flex:none}.switch span{display:block;width:20px;height:20px;border-radius:50%;background:#fff;transform:translateX(0);transition:.2s}.switch.on{background:linear-gradient(90deg,#19d6ff,#2af5d0)}.switch.on span{transform:translateX(20px)}
.more-grid{display:grid;grid-template-columns:1fr;gap:12px}
.preview-map{border:1px solid var(--line);background:linear-gradient(180deg,#0c1623,#08111a);border-radius:24px;padding:12px;overflow:hidden}.preview-map img{display:block;width:100%;height:auto;border-radius:16px;filter:brightness(.68) saturate(.7) hue-rotate(165deg)}
.mapbox{border:1px solid var(--line);border-radius:24px;background:#060b12;padding:10px;overflow:hidden}.maparea{position:relative;border-radius:18px;overflow:hidden;background:#000}.maparea img{display:block;width:100%;height:auto;min-height:210px;object-fit:cover;filter:brightness(.9) saturate(.7) hue-rotate(170deg)}
.dot{position:absolute;width:24px;height:24px;border-radius:50%;transform:translate(-50%,-50%);border:4px solid #e5e7eb;box-shadow:0 10px 22px rgba(0,0,0,.45);z-index:2}.dot:after{content:"";position:absolute;inset:4px;border-radius:50%;background:currentColor}.dot.ok{color:var(--green)}.dot.warning{color:var(--warning)}.dot.critical{color:var(--danger)}.dot.unknown{color:#94a3b8}.label{position:absolute;left:50%;top:calc(100% + 5px);transform:translateX(-50%);max-width:120px;background:rgba(0,0,0,.76);border:1px solid rgba(255,255,255,.16);color:#fff;font-size:10px;font-weight:950;border-radius:999px;padding:4px 7px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.modal{position:fixed;inset:0;background:rgba(0,0,0,.82);z-index:20;display:flex;align-items:flex-start;justify-content:center;padding:calc(env(safe-area-inset-top) + 14px) 12px 16px}.modal-card{width:min(760px,100%);max-height:calc(100vh - 26px);overflow:auto;background:linear-gradient(180deg,#050b12,#03070d);border:1px solid var(--line2);border-radius:30px;box-shadow:0 30px 100px rgba(0,0,0,.82);padding:16px}.modal-head{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:12px}.modal-head h2{margin:0;font-size:22px;letter-spacing:-.5px}.close{width:44px;height:44px;border-radius:16px;border:1px solid var(--line2);background:#111a26;color:#fff;font-size:24px}.map-large{width:880px;max-width:none}.map-scroll{overflow:auto;max-height:58vh;border:1px solid var(--line);border-radius:22px;background:#000;padding:10px;touch-action:pan-x pan-y}.map-large img{min-height:420px}.map-large .dot{width:30px;height:30px;border-width:5px}.map-large .label{font-size:11px;max-width:130px}
.form{display:grid;gap:10px}.field label{display:block;font-size:12px;color:var(--muted);font-weight:950;margin:0 0 6px;text-transform:uppercase;letter-spacing:.5px}.input,select,textarea{width:100%;min-height:52px;border-radius:18px;border:1px solid var(--line2);background:#0d1622;color:#fff;font-size:16px;padding:0 14px;outline:0}textarea{min-height:86px;padding-top:12px;resize:vertical}.form2{display:grid;grid-template-columns:1fr 1fr;gap:10px}.empty{border:1px dashed var(--line2);border-radius:18px;padding:18px;text-align:center;color:var(--muted);font-weight:800}
.action-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:12px 0}.btn{min-height:54px;border:0;border-radius:20px;color:#fff;font-weight:1000;font-size:15px;background:#111b29;border:1px solid rgba(126,151,189,.2);box-shadow:0 14px 38px rgba(0,0,0,.25)}.btn.primary{background:linear-gradient(135deg,#27c7ff,#2af5d0);color:#03111c;border:0}.btn.blue{background:linear-gradient(135deg,#7b6dff,#b36dff);border:0}.btn.red{background:linear-gradient(135deg,#ff5ecb,#ff6b7a);border:0}.btn.full{width:100%;margin-top:10px}.btn.small{min-height:42px;border-radius:16px;font-size:13px}
.nav{position:fixed;left:50%;bottom:calc(env(safe-area-inset-bottom) + 10px);transform:translateX(-50%);width:min(700px,calc(100% - 24px));height:72px;background:rgba(3,8,15,.95);backdrop-filter:blur(18px);border:1px solid rgba(255,255,255,.08);border-radius:24px;display:grid;grid-template-columns:repeat(5,1fr);padding:8px;z-index:15;box-shadow:0 20px 60px rgba(0,0,0,.65)}
.nav button{border:0;background:transparent;color:#7f93aa;font-weight:900;border-radius:18px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;font-size:11px;line-height:1}.nav button .ico{font-size:20px;line-height:1}.nav button.active{background:linear-gradient(135deg,rgba(39,199,255,.2),rgba(42,245,208,.18));color:#fff;box-shadow:inset 0 0 0 1px rgba(42,245,208,.28)}
.toast{position:fixed;left:50%;bottom:104px;transform:translateX(-50%);background:#f6fbff;color:#06111b;border-radius:999px;padding:10px 14px;font-weight:1000;z-index:30;display:none;box-shadow:var(--shadow)}
.footer-note{display:flex;align-items:center;justify-content:center;gap:8px;color:var(--teal);font-size:13px;font-weight:900;letter-spacing:.04em;margin-top:8px;text-transform:uppercase}
@media(max-width:480px){
  .app{padding-left:14px;padding-right:14px}
  .brand{font-size:28px}
  .car-stage{height:160px}
  .health-wrap,.stat-wrap{grid-template-columns:1fr}
  .gauge,.donut{margin:0 auto}
  .quick-grid{grid-template-columns:repeat(4,1fr);gap:8px}
  .quick-btn{min-height:80px}
  .detail-grid,.form2,.split-two{grid-template-columns:1fr}
  .nav{height:68px}
}
</style>
</head>
<body>
<div class="app">
  <section id="home" class="screen active"></section>
  <section id="parts" class="screen"></section>
  <section id="docs" class="screen"></section>
  <section id="history" class="screen"></section>
  <section id="settings" class="screen"></section>
</div>
<nav class="nav" id="nav">
  <button onclick="go('home')"><span class="ico">⌂</span><span>Inicio</span></button>
  <button onclick="go('parts')"><span class="ico">🧰</span><span>Mantenciones</span></button>
  <button onclick="go('docs')"><span class="ico">🗓</span><span>Calendario</span></button>
  <button onclick="go('history')"><span class="ico">📊</span><span>Estadísticas</span></button>
  <button onclick="go('settings')"><span class="ico">⋯</span><span>Más</span></button>
</nav>
<div id="modalRoot"></div><div id="toast" class="toast"></div>
<script>
const APP_VERSION='1.8'; // v1.8: plan de mantenimiento Fiat Punto gasolina
const STORAGE_KEY='miAutoAlDiaData.v1';
const DEFAULT_IMG='vehicle_default.jpg';
const ENGINE_IMG='engine_bay_diagram.png';
const MAP_CATEGORIES=['Motor','Frenos','Ruedas','Fluidos','Servicio','Transmisión','Luces','Exterior','Otros'];
let data=loadData();
let view='home';
let cat='Motor';
let modal=null;
let dragId=null, dragMoved=false;
let maintenanceTab='all';
let detailTab='summary';

function uid(){return (crypto.randomUUID?crypto.randomUUID():Date.now().toString(36)+Math.random().toString(36).slice(2));}
function today(){return new Date().toISOString().slice(0,10)}
function money(n){return '$'+Math.round(Number(n)||0).toLocaleString('es-CL')}
function kmFmt(n){n=Number(n)||0; return n>=1000?Math.round(n/1000)+'K':String(n)}
function esc(s){return String(s??'').replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]))}
function addMonths(dateStr,m){if(!dateStr||!m)return null; const d=new Date(dateStr+'T12:00:00'); if(isNaN(d))return null; d.setMonth(d.getMonth()+Number(m)); return d.toISOString().slice(0,10)}
function daysUntil(dateStr){if(!dateStr)return null; const a=new Date(today()+'T00:00:00'); const b=new Date(dateStr+'T00:00:00'); if(isNaN(b))return null; return Math.ceil((b-a)/86400000)}
function categoryGroup(c){c=String(c||'Otros').toLowerCase(); if(c.includes('document'))return 'Documentos'; if(c.includes('servicio')||c.includes('mantenci')||c.includes('revisión')||c.includes('revision')||c.includes('emisi')||c.includes('diagn'))return 'Servicio'; if(c.includes('fluido')||c.includes('líquido')||c.includes('liquido')||c.includes('nivel')||c.includes('lavacristales'))return 'Fluidos'; if(c.includes('transmisi')||c.includes('cambio')||c.includes('dualogic')||c.includes('embrague'))return 'Transmisión'; if(c.includes('motor')||c.includes('eléctr')||c.includes('electr')||c.includes('bater')||c.includes('correa')||c.includes('buj'))return 'Motor'; if(c.includes('rueda')||c.includes('neum')||c.includes('aline'))return 'Ruedas'; if(c.includes('freno'))return 'Frenos'; if(c.includes('luz')||c.includes('luces'))return 'Luces'; if(c.includes('carro')||c.includes('exterior')||c.includes('limpia')||c.includes('escobilla')||c.includes('cerradura'))return 'Exterior'; return 'Otros'}
function isDoc(i){return !!i.document || categoryGroup(i.category)==='Documentos'}
function itemById(id){return data.items.find(i=>i.id===id)}
function recordsOf(id){return data.records.filter(r=>r.itemId===id).sort((a,b)=>String(b.date||'').localeCompare(String(a.date||'')) || String(b.createdAt||'').localeCompare(String(a.createdAt||'')))}

function defaultData(){return {app:'Mi Auto al Día',version:1,exportedAt:new Date().toISOString(),vehicle:{name:'Fiat Punto',year:'2017',plate:'',currentKm:0,image:DEFAULT_IMG},items:defaultItems(),records:[],settings:{appTitle:'Mi Auto al Día',warnDays:30,warnKm:1000}}}
function migrate(d){const base=defaultData(); d=d||{}; d.vehicle={...base.vehicle,...(d.vehicle||{})}; d.settings={...base.settings,...(d.settings||{})}; d.items=Array.isArray(d.items)?d.items:[]; d.records=Array.isArray(d.records)?d.records:[]; const defaults=Object.fromEntries(base.items.map(i=>[i.id,i])); const byId=Object.fromEntries(d.items.map(i=>[i.id,i])); base.items.forEach(b=>{ if(!byId[b.id]) d.items.push({...b}); }); d.items=d.items.map(i=>{ if(i.id==='driving_permit' && i.name==='Permiso de conducción') i.name='Permiso de circulación'; const def=defaults[i.id]; if(def){ const old={...i}; i={...old,name:def.name,category:def.category,intervalKm:def.intervalKm??null,intervalMonths:def.intervalMonths??null,document:!!def.document,source:def.source||old.source,note:def.note||old.note}; if(old.x===undefined&&def.x!==undefined)i.x=def.x; if(old.y===undefined&&def.y!==undefined)i.y=def.y; i.points=old.points&&Object.keys(old.points).length?old.points:(def.points||{}); } i.points=i.points||{}; if(categoryGroup(i.category)==='Documentos'){i.document=true;i.intervalKm=null;i.intervalMonths=null;} return i}); return {...base,...d};}
function loadData(){try{const raw=localStorage.getItem(STORAGE_KEY); return raw?migrate(JSON.parse(raw)):defaultData()}catch(e){return defaultData()}}
function save(){data.exportedAt=new Date().toISOString(); localStorage.setItem(STORAGE_KEY,JSON.stringify(data));}

function statusOf(item){const rec=lastRecord(item.id); const warnDays=Number(data.settings.warnDays||30); const warnKm=Number(data.settings.warnKm||1000); if(isDoc(item)){ if(!rec||!rec.expiryDate)return {state:'unknown',label:'Sin dato',detail:'Registra vencimiento'}; const d=daysUntil(rec.expiryDate); if(d===null)return {state:'unknown',label:'Sin dato',detail:'Fecha inválida'}; if(d<0)return {state:'critical',label:'Vencido',detail:`Hace ${Math.abs(d)} días`}; if(d<=warnDays)return {state:'warning',label:'Pronto',detail:`Faltan ${d} días`}; return {state:'ok',label:'Al día',detail:`Vence ${fmtDate(rec.expiryDate)}`}; }
 if(!rec)return {state:'unknown',label:'Sin dato',detail:'Sin registro'};
 let dueDate=item.intervalMonths?addMonths(rec.date,item.intervalMonths):null; let days=dueDate?daysUntil(dueDate):null; let kmLeft=null;
 if(item.intervalKm && Number(rec.km)>0 && Number(data.vehicle.currentKm)>0) kmLeft=Number(item.intervalKm)-(Number(data.vehicle.currentKm)-Number(rec.km));
 let crit=false,warn=false,details=[];
 if(days!==null){ if(days<0)crit=true; else if(days<=warnDays)warn=true; details.push(days<0?`fecha vencida ${Math.abs(days)}d`:`${days}d`); }
 if(kmLeft!==null){ if(kmLeft<=0)crit=true; else if(kmLeft<=warnKm)warn=true; details.push(kmLeft<=0?`km vencido ${Math.abs(kmLeft)}`:`${Math.round(kmLeft).toLocaleString('es-CL')} km`); }
 if(crit)return {state:'critical',label:'Crítico',detail:details.join(' · ')||'Vencido'};
 if(warn)return {state:'warning',label:'Pronto',detail:details.join(' · ')||'Próximo'};
 return {state:'ok',label:'Al día',detail:details.join(' · ')||`Último ${fmtDate(rec.date)}`};}
function fmtDate(d){if(!d)return 'sin fecha'; const [y,m,day]=String(d).split('-'); return day&&m?`${day}-${m}-${y}`:String(d)}
function intervalText(i){const km=i.intervalKm?Number(i.intervalKm).toLocaleString('es-CL')+' km':''; const mo=i.intervalMonths?(i.intervalMonths===12?'1 año':i.intervalMonths+' meses'):''; if(km&&mo)return km+' / '+mo; return km||mo||'sin intervalo'}
function health(){const non=data.items.filter(i=>!isDoc(i)); const known=non.map(statusOf).filter(s=>s.state!=='unknown'); if(!known.length)return 0; const score=known.reduce((a,s)=>a+(s.state==='ok'?100:s.state==='warning'?60:s.state==='critical'?15:0),0)/known.length; return Math.round(score)}
function counts(){const mechanical=data.items.filter(i=>!isDoc(i)).map(statusOf); const docs=data.items.filter(isDoc).map(statusOf); return {critical:[...mechanical,...docs].filter(s=>s.state==='critical').length,warning:[...mechanical,...docs].filter(s=>s.state==='warning').length,ok:[...mechanical,...docs].filter(s=>s.state==='ok').length,unknown:[...mechanical,...docs].filter(s=>s.state==='unknown').length,docsUnknown:docs.filter(s=>s.state==='unknown').length}}
function ranked(){return data.items.map(i=>({item:i,st:statusOf(i),rec:lastRecord(i.id)})).sort((a,b)=>({critical:0,warning:1,unknown:2,ok:3}[a.st.state]-{critical:0,warning:1,unknown:2,ok:3}[b.st.state]));}
function stateColor(st){return st==='ok'?'var(--green)':st==='warning'?'var(--yellow)':st==='critical'?'var(--red)':'#94a3b8'}
function dotClass(st){return st==='ok'?'ok':st==='warning'?'warning':st==='critical'?'critical':'unknown'}

function iconForCategory(c){const g=categoryGroup(c); return ({Motor:'🛢',Frenos:'🛞',Ruedas:'◌',Fluidos:'💧',Servicio:'🧰',Transmisión:'⚙',Luces:'💡',Exterior:'🚗',Documentos:'📄',Otros:'•'})[g]||'•'}
function accentForCategory(c){const g=categoryGroup(c); return ({Motor:'var(--green)',Frenos:'var(--purple)',Ruedas:'var(--warning)',Fluidos:'var(--teal2)',Servicio:'var(--teal)',Transmisión:'var(--pink)',Luces:'#8eb8ff',Exterior:'#8ea9c4',Documentos:'#7d8ea6',Otros:'#7d8ea6'})[g]||'var(--teal)'}
function stateLabel(st){return st==='ok'?'Completada':st==='warning'?'Próxima':st==='critical'?'Vencida':'Sin registro'}
function healthText(v){return v>=90?'Excelente':v>=70?'Buena':v>=45?'Atención':'Crítica'}
function nextServiceCandidate(){return ranked().find(x=>!isDoc(x.item)&&x.st.state!=='ok')||ranked().find(x=>!isDoc(x.item))||null}
function nextServiceSummary(){const x=nextServiceCandidate(); if(!x) return {title:'Sin mantenciones pendientes', line1:'Todo al día', line2:'Revisa el historial para más detalle'}; return {title:x.item.name, line1:x.st.detail||intervalText(x.item), line2:intervalText(x.item)} }
function statusMetrics(item){const rec=lastRecord(item.id); let dueDate=item.intervalMonths&&rec?addMonths(rec.date,item.intervalMonths):null; let days=item.intervalMonths&&rec?daysUntil(dueDate):null; let kmLeft=null; if(item.intervalKm && rec && Number(rec.km)>=0 && Number(data.vehicle.currentKm)>=0) kmLeft=Number(item.intervalKm)-(Number(data.vehicle.currentKm)-Number(rec.km)); return {rec,dueDate,days,kmLeft};}
function serviceDueText(item){const m=statusMetrics(item); const p=[]; if(m.kmLeft!==null) p.push((m.kmLeft>0?Math.round(m.kmLeft).toLocaleString('es-CL'):'0')+' km'); if(m.days!==null) p.push((m.days>0?m.days:'0')+' días'); return p.join(' · ')||'Sin registro'}
function serviceRight(item,st){const m=statusMetrics(item); let kmTxt='—'; let dayTxt='—'; if(m.kmLeft!==null){kmTxt=m.kmLeft<=0?'0 km':Math.round(m.kmLeft).toLocaleString('es-CL')+' km'} if(m.days!==null){dayTxt=m.days<=0?'0 días':m.days+' días'} if(st.state==='critical'){ if(m.kmLeft!==null) kmTxt='Vencido'; if(m.days!==null) dayTxt=(m.days||0)+' días'; }
  return {top:kmTxt,bottom:dayTxt}; }
function progressData(item){const m=statusMetrics(item); let pct=0; if(item.intervalKm && m.kmLeft!==null){ pct=100-Math.max(0,Math.min(100,(m.kmLeft/Number(item.intervalKm))*100)); }
 else if(item.intervalMonths && m.days!==null){ const total=Math.max(1,Number(item.intervalMonths)*30); pct=100-Math.max(0,Math.min(100,(m.days/total)*100)); }
 return {pct:Math.max(8,Math.min(100,Math.round(pct))), ...m}; }
function maintenanceItemsByTab(){ const arr=data.items.filter(i=>!isDoc(i)).map(i=>({item:i,st:statusOf(i),rec:lastRecord(i.id)})); const order={critical:0,warning:1,unknown:2,ok:3}; arr.sort((a,b)=>order[a.st.state]-order[b.st.state] || String(a.item.name).localeCompare(String(b.item.name))); if(maintenanceTab==='upcoming') return arr.filter(x=>x.st.state==='warning'); if(maintenanceTab==='overdue') return arr.filter(x=>x.st.state==='critical'); if(maintenanceTab==='done') return arr.filter(x=>x.st.state==='ok' && x.rec); return arr; }
function monthLabel(d){return d.toLocaleDateString('es-CL',{month:'long',year:'numeric'})}
function buildCalendar(){ const now=new Date(); const y=now.getFullYear(), m=now.getMonth(); const first=new Date(y,m,1); const start=(first.getDay()+6)%7; const days=new Date(y,m+1,0).getDate(); const events=new Set(nextEvents(8).map(e=>{ const dd=new Date(e.when+'T00:00:00'); return isNaN(dd)?0:dd.getDate(); }).filter(Boolean)); let html='<div class="calendar-card"><div class="calendar-head"><button class="icon-btn" onclick="toast(\'Vista mensual\')">‹</button><div class="calendar-title">'+monthLabel(now)+'</div><button class="icon-btn" onclick="toast(\'Vista mensual\')">›</button></div><div class="calendar-grid">'; ['LUN','MAR','MIÉ','JUE','VIE','SÁB','DOM'].forEach(n=> html+='<div class="dayname">'+n+'</div>'); for(let i=0;i<start;i++) html+='<div class="day muted"></div>'; for(let d=1; d<=days; d++){ const cls=['day']; if(d===now.getDate()) cls.push('today'); else if(events.has(d)) cls.push('event'); html+='<div class="'+cls.join(' ')+'">'+d+'</div>'; } html+='</div></div>'; return html; }
function nextEvents(limit=6){ const ev=[]; data.items.filter(i=>!isDoc(i)).forEach(i=>{ const m=statusMetrics(i); if(m.rec){ if(m.dueDate) ev.push({item:i,when:m.dueDate,state:statusOf(i).state,kind:'date'}); else if(m.kmLeft!==null) ev.push({item:i,when:today(),state:statusOf(i).state,kind:'km'}); } }); ev.sort((a,b)=> String(a.when).localeCompare(String(b.when))); return ev.slice(0,limit); }
function zoneSummary(){return ['Motor','Frenos','Fluidos','Ruedas','Luces','Batería'].map(name=>{ const base=name==='Batería'?'Motor':name; const arr=data.items.filter(i=>!isDoc(i)&&categoryGroup(i.category)===base).map(statusOf); const state=arr.some(s=>s.state==='critical')?'critical':arr.some(s=>s.state==='warning')?'warning':arr.some(s=>s.state==='unknown')?'unknown':'ok'; return {name,state};});}

<div class="vehicle-hero"><div class="edit-mini">✎</div><div class="hero-head"><div><div class="hero-title">${esc(data.vehicle.name||'Vehículo')}</div><div class="hero-meta"><span class="dot-live"></span><span>${esc(data.vehicle.year||'')}</span></div><div class="plate-chip">${esc(data.vehicle.plate||'Sin patente')}</div></div></div><div class="car-stage"><img src="${data.vehicle.image||DEFAULT_IMG}" alt="vehículo"><div class="orbit"></div></div></div>
<div class="stats-row"><div class="info-card"><span class="label">Kilometraje actual</span><div class="value">${Number(data.vehicle.currentKm||0).toLocaleString('es-CL')} km</div></div><div class="info-card"><span class="label">Próxima revisión</span><div class="value">${next.title.length>20?esc(next.title.slice(0,20))+'…':esc(next.title)}</div><div class="subv">${esc(next.line1)}</div></div></div>
<div class="panel"><div class="health-wrap"><div class="gauge" style="--value:${h}"><div class="gauge-inner"><div><span>Salud general</span><b>${h}%</b><em>${healthText(h)}</em></div></div></div><div class="bullets">${z.slice(0,6).map(a=>`<div class="bullet"><i style="color:${stateColor(a.state)};background:${stateColor(a.state)}"></i><span>${a.name}</span></div>`).join('')}</div></div></div>
<div class="quick-title">Accesos rápidos</div>
<div class="quick-grid"><button class="quick-btn" onclick="openRegister()"><span class="ico">＋</span><small>Agregar<br>Mantención</small></button><button class="quick-btn" onclick="go('history')"><span class="ico">↺</span><small>Historial</small></button><button class="quick-btn" onclick="go('docs')"><span class="ico">🗓</span><small>Calendario</small></button><button class="quick-btn" onclick="go('settings')"><span class="ico">📈</span><small>Reportes</small></button></div>
<div class="panel"><div class="panel-head"><h2>Atención inmediata</h2><button onclick="go('parts')">Ver todo</button></div><div class="list">${top.length?top.map(x=>rowItem(x.item,x.st,false)).join(''):'<div class="empty">Todo lo registrado está al día.</div>'}</div></div>
<div class="footer-note">✦ Minimalista &nbsp; ✦ Futurista &nbsp; ✦ Inteligente</div>`; }
function renderParts(){ const list=maintenanceItemsByTab(); document.getElementById('parts').innerHTML=`<div class="top"><div><h1 class="brand">MANTENCIONES</h1><p class="sub">Visual oscuro, tipo dashboard, con foco en próximos servicios y registro rápido.</p></div><button class="back" onclick="go('home')">←</button></div><div class="maintenance-tabs"><button class="seg ${maintenanceTab==='all'?'active':''}" onclick="maintenanceTab='all';renderParts()">TODAS</button><button class="seg ${maintenanceTab==='upcoming'?'active':''}" onclick="maintenanceTab='upcoming';renderParts()">PRÓXIMAS</button><button class="seg ${maintenanceTab==='overdue'?'active':''}" onclick="maintenanceTab='overdue';renderParts()">VENCIDAS</button><button class="seg ${maintenanceTab==='done'?'active':''}" onclick="maintenanceTab='done';renderParts()">COMPLETADAS</button></div><div class="section-title">${maintenanceTab==='all'?'Listado general':maintenanceTab==='upcoming'?'Próximas mantenciones':maintenanceTab==='overdue'?'Mantenciones vencidas':'Mantenciones completadas'} (${list.length})</div><div class="list">${list.map(x=>rowItem(x.item,x.st)).join('')||'<div class="empty">No hay elementos en esta vista.</div>'}</div><button class="btn primary full" onclick="openRegister()">Registrar mantención</button>`; }
function renderDocs(){ const events=nextEvents(8); document.getElementById('docs').innerHTML=`<div class="top"><div><h1 class="brand">CALENDARIO</h1><p class="sub">Tus próximas acciones y vencimientos en una vista rápida.</p></div><button class="back" onclick="go('home')">←</button></div>${buildCalendar()}<div class="section-title">Próximos eventos</div><div class="list">${events.length?events.map(e=>{ const st=statusOf(e.item); return `<div class="row" onclick="openItem('${e.item.id}')"><div class="maint-left"><div class="icon-badge circle" style="color:${accentForCategory(e.item.category)}">${iconForCategory(e.item.category)}</div><div class="row-main"><b>${esc(e.item.name)}</b><small>${esc(intervalText(e.item))} · ${fmtDate(e.when)}</small></div></div><span class="status ${st.state}">${stateLabel(st.state)}</span></div>` }).join(''):'<div class="empty">Aún no hay fechas calculables. Registra mantenciones para llenar el calendario.</div>'}<div class="row" onclick="go('settings')"><div class="maint-left"><div class="icon-badge circle" style="color:#8ea9c4">📄</div><div class="row-main"><b>Documentos</b><small>SOAP, revisión técnica, permiso y más</small></div></div><span class="status unknown">Abrir</span></div></div>`; }
function renderHistory(){ const totals={}; let totalCost=0; data.records.forEach(r=>{ const i=itemById(r.itemId)||{}; const g=categoryGroup(i.category||'Otros'); totals[g]=(totals[g]||0)+Number(r.cost)||0; totalCost+=Number(r.cost)||0; }); const ordered=Object.entries(totals).sort((a,b)=>b[1]-a[1]).slice(0,5); document.getElementById('history').innerHTML=`<div class="top"><div><h1 class="brand">ESTADÍSTICAS</h1><p class="sub">Resumen visual del gasto, categorías y uso del mantenimiento.</p></div><button class="back" onclick="go('home')">←</button></div><div class="panel"><div class="stat-wrap"><div class="donut"><div class="donut-inner"><div><b>${money(totalCost)}</b><span>Total</span></div></div></div><div class="legend">${ordered.length?ordered.map(([name,val])=>`<div class="legend-row"><div class="legend-left"><i style="background:${accentForCategory(name)}"></i><span>${esc(name)}</span></div><div>${Math.round((val/Math.max(totalCost,1))*100)}% &nbsp; ${money(val)}</div></div>`).join(''):'<div class="tiny">Aún no hay gastos registrados.</div>'}</div></div></div><div class="panel"><div class="panel-head"><h2>Historial reciente</h2><button onclick="exportCsv()">Exportar CSV</button></div><div class="list">${[...data.records].slice(0,6).map(r=>{const i=itemById(r.itemId)||{}; return `<div class="row"><div class="row-main"><b>${esc(i.name||'Registro')}</b><small>${fmtDate(r.date)} · ${r.km?Number(r.km).toLocaleString('es-CL')+' km':'sin km'} · ${money(r.cost)}</small></div><span class="status ${statusOf(i).state}">${esc(categoryGroup(i.category||''))}</span></div>`}).join('')||'<div class="empty">Sin historial.</div>'}</div></div>`; }
function reminderSetting(key,def=true){ if(typeof data.settings[key]==='undefined') data.settings[key]=def; return !!data.settings[key]; }
function toggleSetting(key){ data.settings[key]=!reminderSetting(key,true); save(); renderSettings(); }
function renderSettings(){ document.getElementById('settings').innerHTML=`<div class="top"><div><h1 class="brand">MÁS</h1><p class="sub">Recordatorios, mapa técnico y opciones de respaldo del vehículo.</p></div><button class="back" onclick="go('home')">←</button></div><div class="panel"><div class="panel-head"><h2>Recordatorios</h2><button onclick="toast('Configurado')">⟳</button></div><div class="toggle-list"><div class="toggle-row" onclick="toggleSetting('remKm1000')"><div class="toggle-copy"><b>Control cada 1.000 km</b><small>Fluidos, luces y neumáticos.</small></div><div class="switch ${reminderSetting('remKm1000')?'on':''}"><span></span></div></div><div class="toggle-row" onclick="toggleSetting('remOil3000')"><div class="toggle-copy"><b>Nivel de aceite cada 3.000 km</b><small>Recordatorio preventivo.</small></div><div class="switch ${reminderSetting('remOil3000')?'on':''}"><span></span></div></div><div class="toggle-row" onclick="toggleSetting('remAnnual')"><div class="toggle-copy"><b>Revisión anual</b><small>Aunque no alcances el kilometraje.</small></div><div class="switch ${reminderSetting('remAnnual')?'on':''}"><span></span></div></div><div class="toggle-row" onclick="toggleSetting('remDocs')"><div class="toggle-copy"><b>Vencimiento documentos</b><small>Permiso, seguro y revisión técnica.</small></div><div class="switch ${reminderSetting('remDocs')?'on':''}"><span></span></div></div></div></div><div class="panel"><div class="panel-head"><h2>Mapa del motor</h2><button onclick="openMap('Motor')">Abrir</button></div><div class="preview-map" onclick="openMap('Motor')"><img src="${ENGINE_IMG}" alt="mapa motor"></div><div class="action-grid"><button class="btn" onclick="openMap('Motor')">Mapa motor</button><button class="btn blue" onclick="go('parts')">Mantenciones</button></div></div><div class="panel"><h2>Vehículo</h2><div class="form"><div class="field"><label>Nombre</label><input class="input" id="vehName" value="${esc(data.vehicle.name||'')}"></div><div class="form2"><div class="field"><label>Año</label><input class="input" id="vehYear" value="${esc(data.vehicle.year||'')}"></div><div class="field"><label>Patente</label><input class="input" id="vehPlate" value="${esc(data.vehicle.plate||'')}"></div></div><div class="field"><label>Kilometraje</label><input class="input" type="number" id="vehKm" value="${Number(data.vehicle.currentKm)||''}"></div><button class="btn primary" onclick="saveVehicle()">Guardar vehículo</button></div></div><div class="panel"><h2>Respaldo y actualización</h2><div class="action-grid"><button class="btn" onclick="exportJson()">Guardar JSON</button><button class="btn" onclick="shareJson()">Compartir JSON</button></div><input type="file" id="importFile" accept="application/json,.json" style="display:none" onchange="importJsonFile(event)"><button class="btn full" onclick="document.getElementById('importFile').click()">Importar JSON</button><button class="btn full" onclick="checkUpdates()">Buscar actualizaciones</button><p id="updateBox" class="tiny">Versión instalada: ${nativeVersion()}</p></div><div class="footer-note">🛡 Todo bajo control</div>`; }
function openRegister(category){const items=data.items.filter(i=>!isDoc(i) && (!category || categoryGroup(i.category)===category)); modal=`register:${category||''}`; document.getElementById('modalRoot').innerHTML=`<div class="modal"><div class="modal-card"><div class="modal-head"><h2>Registrar mantención</h2><button class="close" onclick="closeModal()">×</button></div><div class="form"><div class="field"><label>Parte</label><select id="regItem">${items.map(i=>`<option value="${i.id}">${esc(i.name)} · ${esc(categoryGroup(i.category))}</option>`).join('')}</select></div><div class="form2"><div class="field"><label>Fecha</label><input class="input" type="date" id="regDate" value="${today()}"></div><div class="field"><label>Kilometraje</label><input class="input" type="number" id="regKm" value="${Number(data.vehicle.currentKm)||''}"></div></div><div class="form2"><div class="field"><label>Costo</label><input class="input" type="number" id="regCost" placeholder="0"></div><div class="field"><label>Taller / lugar</label><input class="input" id="regShop" placeholder="Opcional"></div></div><div class="field"><label>Notas</label><textarea id="regNotes" placeholder="Ej: 5W40 C3, marca, observaciones"></textarea></div><button class="btn primary" onclick="saveRecord()">Guardar</button></div></div></div>`}
function saveRecord(){const itemId=document.getElementById('regItem').value; const kmRaw=document.getElementById('regKm').value.trim(); const rec={id:uid(),itemId,date:document.getElementById('regDate').value||today(),km:kmRaw===''?null:Number(kmRaw)||null,cost:Number(document.getElementById('regCost').value)||0,shop:document.getElementById('regShop').value.trim(),notes:document.getElementById('regNotes').value.trim(),createdAt:new Date().toISOString()}; data.records.unshift(rec); if(rec.km&&rec.km>data.vehicle.currentKm)data.vehicle.currentKm=rec.km; save(); closeModal(); toast('Mantención guardada'); render();}
function openDoc(id){const item=itemById(id); const rec=lastRecord(id)||{}; document.getElementById('modalRoot').innerHTML=`<div class="modal"><div class="modal-card"><div class="modal-head"><h2>${esc(item.name)}</h2><button class="close" onclick="closeModal()">×</button></div><div class="form"><div class="form2"><div class="field"><label>Fecha otorgada</label><input class="input" type="date" id="docIssue" value="${esc(rec.issueDate||rec.date||today())}"></div><div class="field"><label>Fecha vencimiento</label><input class="input" type="date" id="docExpiry" value="${esc(rec.expiryDate||'')}"></div></div><div class="field"><label>Lugar / nota corta</label><input class="input" id="docShop" value="${esc(rec.shop||'')}" placeholder="Opcional"></div><button class="btn primary" onclick="saveDoc('${id}')">Guardar documento</button></div></div></div>`}
function saveDoc(id){const issue=document.getElementById('docIssue').value||today(); const expiry=document.getElementById('docExpiry').value; data.records.unshift({id:uid(),itemId:id,date:issue,km:0,cost:0,shop:document.getElementById('docShop').value.trim(),notes:'',issueDate:issue,expiryDate:expiry,createdAt:new Date().toISOString()}); save(); closeModal(); toast('Documento guardado'); render();}
function openItem(id){const item=itemById(id); const st=statusOf(item); const rec=lastRecord(id); const p=progressData(item); const due=serviceRight(item,st); document.getElementById('modalRoot').innerHTML=`<div class="modal"><div class="modal-card"><div class="modal-head"><div style="display:flex;align-items:center;gap:12px"><div class="icon-badge circle" style="width:58px;height:58px;color:${accentForCategory(item.category)}">${iconForCategory(item.category)}</div><div><h2 style="margin:0">${esc(item.name)}</h2><div class="tiny">${esc(categoryGroup(item.category))}</div></div></div><button class="close" onclick="closeModal()">×</button></div><div class="maintenance-tabs" style="margin-bottom:12px"><button class="seg active">RESUMEN</button><button class="seg">DETALLES</button><button class="seg">HISTORIAL</button></div><div class="panel slim"><div class="split-two"><div><div class="tiny">${st.state==='critical'?'Vencida':st.state==='warning'?'Faltan':'Estado'}</div><div class="big-number">${esc(due.top)}</div></div><div><div class="tiny">${p.days!==null?'O en':'Intervalo'}</div><div class="big-number">${esc(due.bottom)}</div></div></div><div class="progress-wrap"><div class="progressbar" style="--pct:${p.pct}%"><span></span></div></div></div><div class="detail-grid"><div class="detail-stat"><label>Intervalo</label><b>${esc(intervalText(item))}</b><small>Categoría: ${esc(categoryGroup(item.category))}</small></div><div class="detail-stat"><label>Última vez</label><b>${rec?fmtDate(rec.date):'Sin dato'}</b><small>${rec&&rec.km?Number(rec.km).toLocaleString('es-CL')+' km':'Sin kilometraje'}${rec&&rec.cost?` · ${money(rec.cost)}`:''}</small></div><div class="detail-stat"><label>Tipo</label><b>${item.note&&item.note.includes('5W40')?'Sintético 5W-40':'Según manual'}</b><small>${item.note?esc(item.note.slice(0,80)):'Sin observaciones'}</small></div><div class="detail-stat"><label>Estado</label><b>${stateLabel(st.state)}</b><small>${esc(st.detail)}</small></div></div>${item.note?`<div class="note-card"><div class="tiny" style="margin-bottom:6px">Nota del manual</div><div style="line-height:1.5;color:#d9e8f6">${esc(item.note)}</div></div>`:''}<button class="btn primary full" onclick="closeModal();openRegister('${categoryGroup(item.category)}')">Registrar mantención</button></div></div>`}
function editItem(id){const item=itemById(id); const name=prompt('Nombre',item.name); if(name===null)return; item.name=name.trim()||item.name; const category=prompt('Categoría',item.category||'Motor'); if(category===null)return; item.category=category.trim()||item.category; const km=prompt('Intervalo km vacío = sin control por km',item.intervalKm??''); if(km!==null)item.intervalKm=String(km).trim()===''?null:Number(km)||null; const months=prompt('Intervalo meses vacío = sin control por fecha',item.intervalMonths??''); if(months!==null)item.intervalMonths=String(months).trim()===''?null:Number(months)||null; save(); closeModal(); render();}
function openMap(category){if(category)cat=category; const visible=data.items.filter(i=>!isDoc(i)&&categoryGroup(i.category)===cat); document.getElementById('modalRoot').innerHTML=`<div class="modal"><div class="modal-card"><div class="modal-head"><h2>Mapa del ${cat.toLowerCase()}</h2><button class="close" onclick="closeModal()">×</button></div><div class="pills">${MAP_CATEGORIES.map(c=>`<button class="pill ${cat===c?'active':''}" onclick="cat='${c}';openMap(c)">${c}</button>`).join('')}</div><p class="tiny">Toca un punto para revisar. Mantén y arrastra para moverlo si quieres reorganizar el plano.</p><div class="map-scroll"><div id="bigMap" class="maparea map-large"><img src="${usesEngineMap()?ENGINE_IMG:(data.vehicle.image||DEFAULT_IMG)}">${visible.map(renderDot).join('')}</div></div><button class="btn full" onclick="addPointPrompt()">Agregar punto en esta categoría</button></div></div>`; setTimeout(bindBigMap,0)}
function pointFor(i){const key=usesEngineMap()?'motor':'vehicle'; const p=i.points&&i.points[key]; if(p&&typeof p.x==='number')return p; return {x:Number(i.x||50),y:Number(i.y||50)}}
function setPoint(i,x,y){const key=usesEngineMap()?'motor':'vehicle'; i.points=i.points||{}; i.points[key]={x,y}; if(key==='vehicle'){i.x=x;i.y=y}}
function renderDot(i){const st=statusOf(i).state; const p=pointFor(i); return `<div class="dot ${dotClass(st)}" data-id="${i.id}" style="left:${p.x}%;top:${p.y}%"><span class="label">${esc(i.name)}</span></div>`}
function bindBigMap(){const map=document.getElementById('bigMap'); if(!map)return; const pos=(e)=>{const r=map.getBoundingClientRect(); return {x:Math.max(2,Math.min(98,(e.clientX-r.left)/r.width*100)),y:Math.max(2,Math.min(98,(e.clientY-r.top)/r.height*100))}}; map.querySelectorAll('.dot').forEach(dot=>{dot.addEventListener('click',e=>{e.stopPropagation();openItem(dot.dataset.id)}); dot.addEventListener('pointerdown',e=>{e.stopPropagation(); dragId=dot.dataset.id; dragMoved=false; try{dot.setPointerCapture(e.pointerId)}catch(_){} }); dot.addEventListener('pointermove',e=>{if(dragId!==dot.dataset.id)return; const item=itemById(dragId); const p=pos(e); setPoint(item,p.x,p.y); dot.style.left=p.x+'%'; dot.style.top=p.y+'%'; dragMoved=true;}); dot.addEventListener('pointerup',e=>{if(dragId){save(); if(dragMoved)toast('Punto movido'); dragId=null; dragMoved=false;}});});}
function addPointPrompt(){const name=prompt('Nombre de la parte'); if(!name)return; const item={id:uid(),name:name.trim(),category:cat,x:50,y:50,intervalKm:null,intervalMonths:null,points:{},document:false}; data.items.push(item); save(); openMap(cat); toast('Punto creado al centro. Arrástralo.');}

function closeModal(){document.getElementById('modalRoot').innerHTML=''; modal=null;}
function updateKm(){const km=prompt('Kilometraje actual',data.vehicle.currentKm||''); if(km===null)return; data.vehicle.currentKm=Number(km)||0; save(); toast('Km actualizado'); render();}
function saveVehicle(){data.vehicle.name=document.getElementById('vehName').value.trim()||'Vehículo'; data.vehicle.year=document.getElementById('vehYear').value.trim(); data.vehicle.plate=document.getElementById('vehPlate').value.trim(); data.vehicle.currentKm=Number(document.getElementById('vehKm').value)||0; save(); toast('Vehículo guardado'); renderSettings();}
function exportDataObj(){return {...data,exportedAt:new Date().toISOString()}}
function exportJson(){const json=JSON.stringify(exportDataObj(),null,2); const name='mi-auto-respaldo-'+today()+'.json'; if(window.AndroidBridge?.saveJson)AndroidBridge.saveJson(name,json); else download(name,json,'application/json')}
function shareJson(){const json=JSON.stringify(exportDataObj(),null,2); const name='mi-auto-respaldo-'+today()+'.json'; if(window.AndroidBridge?.shareJson)AndroidBridge.shareJson(name,json); else download(name,json,'application/json')}
function importJsonFile(e){const f=e.target.files&&e.target.files[0]; if(!f)return; const r=new FileReader(); r.onload=()=>{try{const obj=JSON.parse(r.result); if(!obj.vehicle||!Array.isArray(obj.items))throw new Error('JSON inválido'); data=migrate(obj); save(); toast('JSON importado'); go('home');}catch(err){alert('No se pudo importar: '+err.message)}}; r.readAsText(f)}
function csvCell(v){return '"'+String(v??'').replace(/"/g,'""')+'"'}
function exportCsv(){const header=['fecha','elemento','categoria','km','costo','taller','notas','vence']; const rows=data.records.map(r=>{const i=itemById(r.itemId)||{}; return [r.date,i.name||'',i.category||'',r.km||'',r.cost||'',r.shop||'',r.notes||'',r.expiryDate||''].map(csvCell).join(',')}); const csv=header.join(',')+'\n'+rows.join('\n'); if(window.AndroidBridge?.saveCsv)AndroidBridge.saveCsv('mi-auto-historial-'+today()+'.csv',csv); else download('mi-auto-historial.csv',csv,'text/csv')}
function download(name,content,type){const a=document.createElement('a'); a.href=URL.createObjectURL(new Blob([content],{type})); a.download=name; a.click(); setTimeout(()=>URL.revokeObjectURL(a.href),1000)}
function checkUpdates(){const box=document.getElementById('updateBox'); if(box)box.textContent='Buscando...'; if(window.AndroidBridge?.checkGithubUpdates)AndroidBridge.checkGithubUpdates(); else if(box)box.textContent='Disponible solo en APK'}
window.onNativeUpdateResult=(res)=>{const box=document.getElementById('updateBox'); if(!box)return; if(!res||!res.ok){box.textContent='Error: '+(res?.error||'sin respuesta');return;} box.innerHTML=`Última: <b>${esc(res.tagName)}</b>. <button class="btn small" onclick="AndroidBridge.openUpdateUrl('${esc(res.apkUrl||res.htmlUrl)}')">Abrir</button>`}
function nativeVersion(){try{return window.AndroidBridge?.getVersionName?.()||APP_VERSION}catch(e){return APP_VERSION}}
function toast(msg){const t=document.getElementById('toast'); t.textContent=msg; t.style.display='block'; clearTimeout(window.__toast); window.__toast=setTimeout(()=>t.style.display='none',1800)}
function appBack(){if(document.getElementById('modalRoot').innerHTML){closeModal();return 'handled'} if(view!=='home'){go('home');return 'handled'} return 'handled'}
window.appBack=appBack;
render();
</script>
</body>
</html>

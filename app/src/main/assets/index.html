<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Mi Auto al Día</title>
  <style>
    :root{
      --bg:#08111f;
      --bg2:#0c1b2e;
      --card:#111d30;
      --card2:#16243a;
      --line:rgba(255,255,255,.14);
      --text:#f8fafc;
      --muted:#a8b4c7;
      --soft:#dbeafe;
      --ok:#22c55e;
      --warn:#f59e0b;
      --bad:#ef4444;
      --unknown:#94a3b8;
      --blue:#38bdf8;
      --violet:#8b5cf6;
      --radius:28px;
      --shadow:0 22px 60px rgba(0,0,0,.32);
    }
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    html,body{margin:0;min-height:100%;background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
    body{background:
      radial-gradient(circle at 20% 0%, rgba(56,189,248,.22), transparent 35%),
      radial-gradient(circle at 90% 15%, rgba(139,92,246,.18), transparent 35%),
      linear-gradient(180deg,#091226 0%,#06111c 100%);}
    button,input,select,textarea{font:inherit}
    button{border:0;cursor:pointer;color:inherit}
    .app{width:min(100%,760px);margin:0 auto;min-height:100vh;padding:calc(env(safe-area-inset-top) + 26px) 22px calc(env(safe-area-inset-bottom) + 32px)}
    .top{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;margin-bottom:20px}
    .brand{line-height:.95;font-weight:950;letter-spacing:-2px;font-size:clamp(42px,11vw,72px);background:linear-gradient(90deg,#22d3ee,#60a5fa,#a78bfa);-webkit-background-clip:text;background-clip:text;color:transparent;filter:drop-shadow(0 10px 26px rgba(59,130,246,.22))}
    .subtitle{margin-top:10px;color:var(--muted);font-size:16px;line-height:1.35;max-width:520px}
    .pill{display:inline-flex;align-items:center;gap:8px;border:1px solid var(--line);background:rgba(255,255,255,.08);border-radius:999px;padding:10px 14px;color:var(--soft);font-weight:800;white-space:nowrap}
    .grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
    .stats{margin:22px 0 18px}
    .stat{background:linear-gradient(180deg,rgba(255,255,255,.12),rgba(255,255,255,.06));border:1px solid var(--line);border-radius:22px;padding:16px 16px;box-shadow:0 12px 34px rgba(0,0,0,.18)}
    .stat small{display:block;color:var(--muted);font-weight:800;margin-bottom:8px}.stat strong{font-size:26px;line-height:1}
    .panel{background:linear-gradient(180deg,rgba(255,255,255,.1),rgba(255,255,255,.045));border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:18px;margin:16px 0}
    .section-title{font-size:22px;font-weight:950;margin:0 0 12px}.section-sub{color:var(--muted);line-height:1.45;margin:0 0 16px}
    .car-wrap{position:relative;background:#f8fafc;border-radius:28px;overflow:hidden;border:1px solid rgba(255,255,255,.18);box-shadow:0 18px 55px rgba(0,0,0,.32);touch-action:none}
    .car-wrap img{display:block;width:100%;height:auto;min-height:230px;object-fit:cover}
    .hotspot{position:absolute;width:28px;height:28px;border-radius:999px;transform:translate(-50%,-50%);border:4px solid #fff;box-shadow:0 10px 28px rgba(0,0,0,.42),0 0 0 6px rgba(255,255,255,.22);display:grid;place-items:center;font-size:0}
    .hotspot::after{content:"";width:9px;height:9px;border-radius:999px;background:#fff;opacity:.88}
    .hotspot.ok{background:var(--ok)}.hotspot.warning{background:var(--warn)}.hotspot.critical{background:var(--bad)}.hotspot.unknown{background:var(--unknown)}
    .legend{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:12px;color:var(--muted);font-weight:800;font-size:12px}.legend span{display:flex;align-items:center;gap:6px}.dot{width:12px;height:12px;border-radius:99px;display:inline-block}.okdot{background:var(--ok)}.warndot{background:var(--warn)}.baddot{background:var(--bad)}.unkdot{background:var(--unknown)}
    .actions{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:18px}.bigbtn{min-height:82px;border-radius:24px;font-size:19px;font-weight:950;background:linear-gradient(135deg,#22c55e,#0891b2);box-shadow:0 18px 36px rgba(34,197,94,.18)}.bigbtn.alt{background:linear-gradient(135deg,#3b82f6,#7c3aed)}.bigbtn.soft{background:rgba(255,255,255,.08);border:1px solid var(--line);box-shadow:none}.bigbtn.danger{background:linear-gradient(135deg,#fb7185,#e11d48)}
    .list{display:flex;flex-direction:column;gap:12px}.item-card{background:rgba(255,255,255,.075);border:1px solid var(--line);border-radius:22px;padding:14px 14px;display:flex;justify-content:space-between;gap:12px;align-items:center}.item-card h3{margin:0 0 6px;font-size:17px}.item-card p{margin:0;color:var(--muted);font-weight:700;font-size:13px;line-height:1.35}.badge{border-radius:999px;padding:8px 11px;font-size:12px;font-weight:950;color:#06111c;background:#fff;white-space:nowrap}.badge.ok{background:#86efac}.badge.warning{background:#fcd34d}.badge.critical{background:#fca5a5}.badge.unknown{background:#cbd5e1}
    .nav{position:sticky;bottom:12px;z-index:20;margin-top:22px;display:grid;grid-template-columns:repeat(4,1fr);gap:8px;background:rgba(6,17,28,.82);backdrop-filter:blur(16px);border:1px solid var(--line);border-radius:24px;padding:8px}.nav button{height:54px;border-radius:18px;background:transparent;color:var(--muted);font-weight:900}.nav button.active{background:linear-gradient(135deg,#22d3ee,#8b5cf6);color:white;box-shadow:0 10px 28px rgba(59,130,246,.22)}
    .screen{display:none}.screen.active{display:block}.back-row{display:flex;align-items:center;gap:14px;margin-bottom:18px}.back{width:58px;height:58px;border-radius:18px;background:rgba(255,255,255,.1);border:1px solid var(--line);font-size:24px;font-weight:950}.h1{font-size:34px;font-weight:950;letter-spacing:-1px;margin:0}.field{display:flex;flex-direction:column;gap:8px;margin-bottom:14px}.field label{font-size:13px;color:var(--muted);font-weight:950;text-transform:uppercase;letter-spacing:2px}input,select,textarea{width:100%;border:1px solid var(--line);background:rgba(255,255,255,.08);color:var(--text);border-radius:20px;padding:16px;outline:none}select option{background:#111827;color:#fff}textarea{min-height:92px;resize:vertical}.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}.save{width:100%;min-height:64px;border-radius:22px;background:linear-gradient(135deg,#22c55e,#16a34a);font-weight:950;font-size:18px;margin-top:6px}.ghost{width:100%;min-height:58px;border-radius:20px;background:rgba(255,255,255,.08);border:1px solid var(--line);font-weight:900}.danger-line{width:100%;min-height:58px;border-radius:20px;background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.35);color:#fecaca;font-weight:900}.tabs{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin:14px 0}.tabs button{height:50px;border-radius:16px;background:rgba(255,255,255,.08);border:1px solid var(--line);font-weight:900;color:var(--muted)}.tabs button.active{color:#fff;background:linear-gradient(135deg,#2563eb,#7c3aed)}
    .toast{position:fixed;left:22px;right:22px;bottom:calc(env(safe-area-inset-bottom) + 94px);z-index:100;background:#f8fafc;color:#0f172a;border-radius:18px;padding:14px 16px;font-weight:900;box-shadow:0 20px 60px rgba(0,0,0,.35);display:none}.toast.show{display:block}.empty{border:1px dashed var(--line);border-radius:22px;padding:20px;color:var(--muted);text-align:center;font-weight:800}.mini{font-size:12px;color:var(--muted);line-height:1.4}.record-date{font-size:12px;color:#c4b5fd;font-weight:900}.toolbar{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:12px 0}.map-edit{outline:3px dashed rgba(245,158,11,.72);outline-offset:4px}.map-edit .hotspot{cursor:grab}.colorbar{height:7px;border-radius:99px;margin-top:10px;background:linear-gradient(90deg,var(--ok),var(--warn),var(--bad))}
    @media(max-width:430px){.app{padding-left:18px;padding-right:18px}.brand{font-size:48px}.actions{grid-template-columns:1fr 1fr}.bigbtn{min-height:76px}.form-grid,.grid2{grid-template-columns:1fr 1fr}.legend{grid-template-columns:1fr 1fr}.h1{font-size:30px}}
  </style>
</head>
<body>
  <main class="app">
    <section id="home" class="screen active"></section>
    <section id="register" class="screen"></section>
    <section id="items" class="screen"></section>
    <section id="history" class="screen"></section>
    <section id="settings" class="screen"></section>
    <nav class="nav">
      <button data-go="home" class="active">Inicio</button>
      <button data-go="register">Registrar</button>
      <button data-go="items">Partes</button>
      <button data-go="history">Historial</button>
    </nav>
  </main>
  <div id="toast" class="toast"></div>

<script>
const APP_VERSION='1.0';
const STORAGE_KEY='miAutoAlDiaData.v1';
const DEFAULT_IMG='vehicle_default.jpg';
const DEFAULT_ITEMS=[
  {id:'oil',name:'Aceite motor',category:'Motor',x:33,y:47,intervalKm:10000,intervalMonths:12},
  {id:'oil_filter',name:'Filtro de aceite',category:'Motor',x:37,y:51,intervalKm:10000,intervalMonths:12},
  {id:'air_filter',name:'Filtro de aire',category:'Motor',x:30,y:40,intervalKm:15000,intervalMonths:12},
  {id:'spark_plugs',name:'Bujías',category:'Motor',x:36,y:44,intervalKm:40000,intervalMonths:36},
  {id:'tires',name:'Neumáticos',category:'Ruedas',x:65,y:75,intervalKm:null,intervalMonths:6},
  {id:'front_brakes',name:'Frenos delanteros',category:'Frenos',x:51,y:76,intervalKm:20000,intervalMonths:12},
  {id:'rear_brakes',name:'Frenos traseros',category:'Frenos',x:84,y:61,intervalKm:20000,intervalMonths:12},
  {id:'timing_belt',name:'Correa distribución',category:'Motor',x:25,y:50,intervalKm:60000,intervalMonths:60},
  {id:'battery',name:'Batería',category:'Eléctrico',x:31,y:34,intervalKm:null,intervalMonths:36},
  {id:'coolant',name:'Refrigerante',category:'Motor',x:28,y:55,intervalKm:40000,intervalMonths:24},
  {id:'lights_front',name:'Luces delanteras',category:'Luces',x:14,y:57,intervalKm:null,intervalMonths:6},
  {id:'lights_rear',name:'Luces traseras',category:'Luces',x:94,y:37,intervalKm:null,intervalMonths:6},
  {id:'alignment',name:'Alineación y balanceo',category:'Ruedas',x:62,y:81,intervalKm:10000,intervalMonths:6},
  {id:'wipers',name:'Limpiaparabrisas',category:'Carrocería',x:34,y:27,intervalKm:null,intervalMonths:12},
  {id:'technical_review',name:'Revisión técnica',category:'Documentos',x:50,y:10,intervalKm:null,intervalMonths:12},
  {id:'soap',name:'SOAP / Seguro obligatorio',category:'Documentos',x:58,y:10,intervalKm:null,intervalMonths:12}
];
function uid(){return (crypto.randomUUID?crypto.randomUUID():('id-'+Date.now()+'-'+Math.random().toString(16).slice(2)));}
function today(){return new Date().toISOString().slice(0,10);}
function money(n){return '$'+Number(n||0).toLocaleString('es-CL');}
function km(n){return Number(n||0).toLocaleString('es-CL')+' km';}
function daysBetween(a,b){const A=new Date(a+'T00:00:00'); const B=new Date(b+'T00:00:00'); return Math.round((B-A)/86400000);}
function addMonths(date, months){const d=new Date(date+'T00:00:00'); d.setMonth(d.getMonth()+Number(months||0)); return d.toISOString().slice(0,10);}
function defaultData(){return {app:'Mi Auto al Día',version:1,exportedAt:null,vehicle:{name:'Fiat Punto',year:'',plate:'',currentKm:0,image:DEFAULT_IMG},items:DEFAULT_ITEMS,records:[],settings:{appTitle:'Mi Auto al Día',warnDays:30,warnKm:1000}};}
let data=loadData();
let currentScreen='home';
let selectedTab='urgent';
let editingMap=false;
let dragId=null;
function loadData(){try{const raw=localStorage.getItem(STORAGE_KEY); if(!raw)return defaultData(); const parsed=JSON.parse(raw); return migrate(parsed);}catch(e){return defaultData();}}
function migrate(d){const base=defaultData(); d=d||{}; d.vehicle={...base.vehicle,...(d.vehicle||{})}; d.settings={...base.settings,...(d.settings||{})}; d.items=Array.isArray(d.items)&&d.items.length?d.items:base.items; d.records=Array.isArray(d.records)?d.records:[]; return d;}
function save(){localStorage.setItem(STORAGE_KEY,JSON.stringify(data));}
function toast(msg){const el=document.getElementById('toast'); el.textContent=msg; el.classList.add('show'); setTimeout(()=>el.classList.remove('show'),2500);}
function itemById(id){return data.items.find(i=>i.id===id);}
function recordsFor(id){return data.records.filter(r=>r.itemId===id).sort((a,b)=>(b.date||'').localeCompare(a.date||'') || (b.createdAt||'').localeCompare(a.createdAt||''));}
function lastRecord(id){return recordsFor(id)[0]||null;}
function statusFor(item){const rec=lastRecord(item.id); if(!rec)return {status:'unknown',label:'Sin dato',detail:'Registra una mantención'}; const now=today(); let critical=false, warning=false, details=[];
  if(item.intervalMonths){const due=addMonths(rec.date,item.intervalMonths); const left=daysBetween(now,due); details.push('Fecha '+due); if(left<0)critical=true; else if(left<=Number(data.settings.warnDays||30))warning=true;}
  if(item.intervalKm && rec.km){const dueKm=Number(rec.km)+Number(item.intervalKm); const leftKm=dueKm-Number(data.vehicle.currentKm||0); details.push(km(dueKm)); if(leftKm<0)critical=true; else if(leftKm<=Number(data.settings.warnKm||1000))warning=true;}
  if(critical)return {status:'critical',label:'Crítico',detail:details.join(' · ')};
  if(warning)return {status:'warning',label:'Pronto',detail:details.join(' · ')};
  return {status:'ok',label:'Al día',detail:details.join(' · ')};
}
function summary(){const statuses=data.items.map(statusFor); return {ok:statuses.filter(s=>s.status==='ok').length, warning:statuses.filter(s=>s.status==='warning').length, critical:statuses.filter(s=>s.status==='critical').length, unknown:statuses.filter(s=>s.status==='unknown').length, spent:data.records.reduce((a,r)=>a+Number(r.cost||0),0)};}
function go(screen){currentScreen=screen; render();}
function appBack(){ if(currentScreen!=='home'){go('home'); return 'handled';} return 'handled';}
window.appBack=appBack;
function header(sub='Control visual de mantenciones, fechas y kilometraje.') {return `<div class="top"><div><div class="brand">${escapeHtml(data.settings.appTitle||'Mi Auto al Día')}</div><div class="subtitle">${sub}</div></div><button class="pill" onclick="go('settings')">⚙️</button></div>`}
function render(){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active')); document.getElementById(currentScreen).classList.add('active'); document.querySelectorAll('.nav button').forEach(b=>b.classList.toggle('active',b.dataset.go===currentScreen)); ({home:renderHome,register:renderRegister,items:renderItems,history:renderHistory,settings:renderSettings}[currentScreen])();}
function renderHome(){const s=summary(); const ordered=data.items.map(i=>({item:i,st:statusFor(i)})).sort((a,b)=>rank(a.st.status)-rank(b.st.status)); document.getElementById('home').innerHTML=`${header('Tu vehículo, sus puntos críticos y próximas mantenciones.')}
  <div class="stats grid2"><div class="stat"><small>Críticos</small><strong>${s.critical}</strong></div><div class="stat"><small>Próximos</small><strong>${s.warning}</strong></div><div class="stat"><small>Al día</small><strong>${s.ok}</strong></div><div class="stat"><small>Kilometraje</small><strong>${km(data.vehicle.currentKm||0)}</strong></div></div>
  ${renderCarMap()}
  <div class="actions"><button class="bigbtn" onclick="go('register')">Registrar mantención</button><button class="bigbtn alt" onclick="quickKm()">Actualizar km</button><button class="bigbtn soft" onclick="go('items')">Ver partes</button><button class="bigbtn soft" onclick="go('history')">Historial</button></div>
  <div class="panel"><h2 class="section-title">Prioridad</h2><div class="list">${ordered.slice(0,6).map(renderItemRow).join('')||'<div class="empty">Sin elementos</div>'}</div></div>`; bindMapEvents();}
function renderCarMap(){return `<div class="panel"><h2 class="section-title">Mapa del auto</h2><p class="section-sub">Toca un punto para registrar o revisar una parte.</p><div id="carMap" class="car-wrap ${editingMap?'map-edit':''}"><img src="${data.vehicle.image||DEFAULT_IMG}" alt="Vehículo">${data.items.map(i=>{const st=statusFor(i).status;return `<button class="hotspot ${st}" style="left:${i.x}%;top:${i.y}%" data-id="${i.id}" title="${escapeHtml(i.name)}" onclick="openItem('${i.id}')"></button>`}).join('')}</div><div class="legend"><span><i class="dot okdot"></i>Al día</span><span><i class="dot warndot"></i>Pronto</span><span><i class="dot baddot"></i>Crítico</span><span><i class="dot unkdot"></i>Sin dato</span></div></div>`}
function renderItemRow(obj){const item=obj.item||obj; const st=obj.st||statusFor(item); const rec=lastRecord(item.id); return `<div class="item-card" onclick="openItem('${item.id}')"><div><h3>${escapeHtml(item.name)}</h3><p>${escapeHtml(item.category||'')} ${rec?`· último ${formatDate(rec.date)} · ${rec.km?km(rec.km):'sin km'}`:'· sin registro'}</p><p>${escapeHtml(st.detail||'')}</p></div><span class="badge ${st.status}">${st.label}</span></div>`}
function rank(st){return {critical:0,warning:1,unknown:2,ok:3}[st]??9;}
function renderRegister(prefill=''){const opts=data.items.map(i=>`<option value="${i.id}" ${i.id===prefill?'selected':''}>${escapeHtml(i.name)}</option>`).join(''); document.getElementById('register').innerHTML=`<div class="back-row"><button class="back" onclick="go('home')">←</button><h1 class="h1">Registrar</h1></div><div class="panel"><p class="section-sub">Guarda fecha, kilometraje, costo y notas de una mantención.</p><div class="field"><label>Elemento</label><select id="recItem">${opts}</select></div><div class="form-grid"><div class="field"><label>Fecha</label><input id="recDate" type="date" value="${today()}"></div><div class="field"><label>Kilometraje</label><input id="recKm" type="number" placeholder="Ej: 184500" value="${data.vehicle.currentKm||''}"></div></div><div class="form-grid"><div class="field"><label>Costo</label><input id="recCost" type="number" placeholder="Ej: 45000"></div><div class="field"><label>Taller / marca</label><input id="recShop" placeholder="Lubricentro, repuesto, etc."></div></div><div class="field"><label>Notas</label><textarea id="recNotes" placeholder="Ej: Aceite 10W40 + filtro"></textarea></div><button class="save" onclick="saveRecord()">Guardar mantención</button></div>`}
function saveRecord(){const itemId=val('recItem'); const r={id:uid(),itemId,date:val('recDate')||today(),km:Number(val('recKm')||0),cost:Number(val('recCost')||0),shop:val('recShop'),notes:val('recNotes'),createdAt:new Date().toISOString()}; if(r.km>0)data.vehicle.currentKm=Math.max(Number(data.vehicle.currentKm||0),r.km); data.records.unshift(r); save(); toast('Mantención guardada'); go('home');}
function renderItems(){let groups={}; data.items.forEach(i=>{(groups[i.category||'Otros']||(groups[i.category||'Otros']=[])).push(i)}); document.getElementById('items').innerHTML=`<div class="back-row"><button class="back" onclick="go('home')">←</button><h1 class="h1">Partes</h1></div><div class="toolbar"><button class="ghost" onclick="toggleMapEdit()">${editingMap?'Guardar puntos':'Mover puntos'}</button><button class="ghost" onclick="addCustomItem()">Agregar parte</button></div>${renderCarMap()}${Object.entries(groups).map(([g,items])=>`<div class="panel"><h2 class="section-title">${escapeHtml(g)}</h2><div class="list">${items.map(i=>renderItemRow(i)).join('')}</div></div>`).join('')}`; bindMapEvents();}
function openItem(id){const item=itemById(id); if(!item)return; const st=statusFor(item); const recs=recordsFor(id); currentScreen='items'; document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active')); const el=document.getElementById('items'); el.classList.add('active'); el.innerHTML=`<div class="back-row"><button class="back" onclick="go('items')">←</button><h1 class="h1">${escapeHtml(item.name)}</h1></div><div class="panel"><span class="badge ${st.status}">${st.label}</span><p class="section-sub" style="margin-top:12px">${escapeHtml(st.detail)}</p><div class="grid2"><div class="stat"><small>Cada km</small><strong>${item.intervalKm?km(item.intervalKm):'Manual'}</strong></div><div class="stat"><small>Cada meses</small><strong>${item.intervalMonths||'Manual'}</strong></div></div><button class="save" onclick="goRegister('${id}')">Registrar aquí</button><button class="ghost" style="margin-top:10px" onclick="editItem('${id}')">Editar regla</button></div><div class="panel"><h2 class="section-title">Historial</h2><div class="list">${recs.map(renderRecord).join('')||'<div class="empty">Aún no tiene registros</div>'}</div></div>`;}
function goRegister(id){go('register'); setTimeout(()=>{const e=document.getElementById('recItem'); if(e)e.value=id},0)}
function renderRecord(r){const item=itemById(r.itemId); return `<div class="item-card"><div><div class="record-date">${formatDate(r.date)} · ${r.km?km(r.km):'sin km'}</div><h3>${escapeHtml(item?item.name:'Elemento eliminado')}</h3><p>${r.cost?money(r.cost)+' · ':''}${escapeHtml(r.shop||'')} ${r.notes?'· '+escapeHtml(r.notes):''}</p></div><button class="badge unknown" onclick="deleteRecord('${r.id}')">Borrar</button></div>`}
function renderHistory(){const total=data.records.reduce((a,r)=>a+Number(r.cost||0),0); document.getElementById('history').innerHTML=`<div class="back-row"><button class="back" onclick="go('home')">←</button><h1 class="h1">Historial</h1></div><div class="stats grid2"><div class="stat"><small>Registros</small><strong>${data.records.length}</strong></div><div class="stat"><small>Gasto total</small><strong>${money(total)}</strong></div></div><div class="toolbar"><button class="ghost" onclick="exportJson()">Exportar JSON</button><button class="ghost" onclick="exportCsv()">Exportar CSV</button></div><div class="panel"><div class="field"><label>Buscar</label><input id="search" placeholder="Aceite, taller, fecha..." oninput="renderHistoryList()"></div><div id="historyList" class="list"></div></div>`; renderHistoryList();}
function renderHistoryList(){const q=(document.getElementById('search')?.value||'').toLowerCase(); const rows=data.records.filter(r=>{const i=itemById(r.itemId); return [i?.name,r.date,r.shop,r.notes,String(r.km),String(r.cost)].join(' ').toLowerCase().includes(q)}); document.getElementById('historyList').innerHTML=rows.map(renderRecord).join('')||'<div class="empty">Sin resultados</div>';}
function renderSettings(){document.getElementById('settings').innerHTML=`<div class="back-row"><button class="back" onclick="go('home')">←</button><h1 class="h1">Ajustes</h1></div><div class="panel"><h2 class="section-title">Vehículo</h2><div class="field"><label>Nombre</label><input id="vehName" value="${escapeAttr(data.vehicle.name||'')}"></div><div class="form-grid"><div class="field"><label>Año</label><input id="vehYear" value="${escapeAttr(data.vehicle.year||'')}"></div><div class="field"><label>Patente</label><input id="vehPlate" value="${escapeAttr(data.vehicle.plate||'')}"></div></div><div class="field"><label>Kilometraje actual</label><input id="vehKm" type="number" value="${data.vehicle.currentKm||''}"></div><button class="save" onclick="saveVehicle()">Guardar vehículo</button></div><div class="panel"><h2 class="section-title">Respaldo</h2><p class="section-sub">Exporta o importa todo como JSON.</p><div class="toolbar"><button class="ghost" onclick="exportJson()">Guardar JSON</button><button class="ghost" onclick="shareJson()">Compartir JSON</button></div><input type="file" id="importFile" accept="application/json,.json" style="display:none" onchange="importJsonFile(event)"><button class="ghost" onclick="document.getElementById('importFile').click()">Importar JSON</button></div><div class="panel"><h2 class="section-title">Actualizaciones</h2><p class="section-sub">Versión instalada: <b>${nativeVersion()}</b></p><button class="ghost" onclick="checkUpdates()">Buscar actualizaciones</button><p id="updateBox" class="mini"></p></div><div class="panel"><h2 class="section-title">Zona peligrosa</h2><button class="danger-line" onclick="resetData()">Borrar datos locales</button></div>`}
function saveVehicle(){data.vehicle.name=val('vehName');data.vehicle.year=val('vehYear');data.vehicle.plate=val('vehPlate');data.vehicle.currentKm=Number(val('vehKm')||0);save();toast('Vehículo guardado');go('home');}
function quickKm(){const n=prompt('Kilometraje actual',data.vehicle.currentKm||''); if(n===null)return; data.vehicle.currentKm=Number(String(n).replace(/[^0-9]/g,'')); save(); render();}
function editItem(id){const item=itemById(id); if(!item)return; const kmv=prompt('Intervalo en km. Vacío = manual', item.intervalKm||''); if(kmv===null)return; const mv=prompt('Intervalo en meses. Vacío = manual', item.intervalMonths||''); if(mv===null)return; item.intervalKm=kmv?Number(kmv):null; item.intervalMonths=mv?Number(mv):null; save(); openItem(id);}
function addCustomItem(){const name=prompt('Nombre de la parte'); if(!name)return; data.items.push({id:uid(),name,category:'Personalizado',x:50,y:50,intervalKm:null,intervalMonths:null}); save(); renderItems();}
function deleteRecord(id){if(!confirm('¿Borrar este registro?'))return; data.records=data.records.filter(r=>r.id!==id); save(); render();}
function toggleMapEdit(){editingMap=!editingMap; toast(editingMap?'Mantén y arrastra puntos':'Puntos guardados'); renderItems();}
function bindMapEvents(){const map=document.getElementById('carMap'); if(!map)return; const move=(clientX,clientY)=>{if(!editingMap||!dragId)return; const rect=map.getBoundingClientRect(); const item=itemById(dragId); if(!item)return; item.x=Math.max(3,Math.min(97,((clientX-rect.left)/rect.width)*100)); item.y=Math.max(3,Math.min(97,((clientY-rect.top)/rect.height)*100)); const dot=map.querySelector(`[data-id="${dragId}"]`); if(dot){dot.style.left=item.x+'%';dot.style.top=item.y+'%';}}; map.querySelectorAll('.hotspot').forEach(dot=>{dot.addEventListener('pointerdown',e=>{if(!editingMap)return; e.preventDefault(); dragId=dot.dataset.id; dot.setPointerCapture(e.pointerId);});dot.addEventListener('pointermove',e=>move(e.clientX,e.clientY));dot.addEventListener('pointerup',()=>{if(dragId){save();dragId=null;}});});}
function exportPayload(){return JSON.stringify({...data,exportedAt:new Date().toISOString()},null,2);}
function exportJson(){const name='mi-auto-respaldo-'+today()+'.json'; const json=exportPayload(); if(window.AndroidBridge?.saveJson)AndroidBridge.saveJson(name,json); else download(name,json,'application/json');}
function shareJson(){const name='mi-auto-respaldo-'+today()+'.json'; const json=exportPayload(); if(window.AndroidBridge?.shareJson)AndroidBridge.shareJson(name,json); else download(name,json,'application/json');}
function exportCsv(){const header=['fecha','elemento','categoria','km','costo','taller','notas']; const rows=data.records.map(r=>{const i=itemById(r.itemId)||{}; return [r.date,i.name||'',i.category||'',r.km||'',r.cost||'',r.shop||'',r.notes||''].map(csvCell).join(',')}); const csv=header.join(',')+'\n'+rows.join('\n'); if(window.AndroidBridge?.saveCsv)AndroidBridge.saveCsv('mi-auto-historial-'+today()+'.csv',csv); else download('mi-auto-historial.csv',csv,'text/csv');}
function importJsonFile(ev){const file=ev.target.files[0]; if(!file)return; const fr=new FileReader(); fr.onload=()=>{try{const parsed=migrate(JSON.parse(fr.result)); if(!Array.isArray(parsed.items)||!Array.isArray(parsed.records))throw new Error('Formato inválido'); data=parsed; save(); toast('Respaldo importado'); go('home');}catch(e){alert('No se pudo importar: '+e.message)}}; fr.readAsText(file);}
function resetData(){if(!confirm('Esto borrará los datos locales de la app. ¿Continuar?'))return; localStorage.removeItem(STORAGE_KEY); data=defaultData(); save(); go('home');}
function checkUpdates(){const box=document.getElementById('updateBox'); if(box)box.textContent='Buscando...'; if(window.AndroidBridge?.checkGithubUpdates)AndroidBridge.checkGithubUpdates(); else if(box)box.textContent='Disponible solo en APK.';}
window.onNativeUpdateResult=function(res){const box=document.getElementById('updateBox'); if(!box)return; if(!res||!res.ok){box.textContent='No se pudo revisar: '+(res?.error||'error');return;} box.innerHTML=`Última: <b>${escapeHtml(res.tagName||res.name||'')}</b><br><button class="ghost" onclick="AndroidBridge.openUpdateUrl('${escapeAttr(res.apkUrl||res.htmlUrl)}')">Abrir descarga</button>`}
function nativeVersion(){try{return window.AndroidBridge?.getVersionName?.()||APP_VERSION}catch(e){return APP_VERSION}}
function download(name,content,type){const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([content],{type}));a.download=name;a.click();setTimeout(()=>URL.revokeObjectURL(a.href),1000)}
function csvCell(v){return '"'+String(v??'').replaceAll('"','""')+'"'}
function val(id){return document.getElementById(id)?.value||''}
function formatDate(d){if(!d)return''; const [y,m,day]=d.split('-'); return `${day}-${m}-${y}`}
function escapeHtml(s){return String(s??'').replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]))}
function escapeAttr(s){return escapeHtml(s)}
document.querySelectorAll('.nav button').forEach(b=>b.onclick=()=>go(b.dataset.go));
render();
</script>
</body>
</html>

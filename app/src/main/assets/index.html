ar-gradient(135deg,var(--teal),#20d799);color:#031018;font-weight:950}
.bottom-nav{position:fixed;left:10px;right:10px;bottom:8px;max-width:500px;margin:auto;height:78px;border-radius:27px;background:linear-gradient(180deg,rgba(11,24,40,.96),rgba(4,10,18,.96));border:1px solid var(--stroke);box-shadow:0 -12px 42px rgba(0,0,0,.52);display:grid;grid-template-columns:1fr 1fr 84px 1fr 1fr;align-items:center;z-index:10;backdrop-filter:blur(18px);padding-bottom:env(safe-area-inset-bottom)}.nav-item{height:66px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;color:#8795ae;font-size:11px;font-weight:850}.nav-item .nav-ico{font-size:22px}.nav-item.active{color:var(--teal)}.nav-item.active:after{content:"";width:5px;height:5px;border-radius:50%;background:var(--teal);box-shadow:0 0 10px var(--teal)}.add-btn{width:68px;height:68px;border-radius:50%;background:linear-gradient(135deg,#24e6ca,#28d99d);color:#031018;display:grid;place-items:center;font-size:40px;box-shadow:0 0 34px rgba(40,231,199,.32);margin:auto;transform:translateY(-15px)}.hidden{display:none!important}

function alertCard(a,compact=false){return `<div class="alert-card ${colorClass(a.color)}"><div class="alert-icon">${a.icon}</div><div><h3>${a.title}</h3><div class="status">${a.status}</div><p>${a.category} · ${a.detail}</p><div class="progress"><i style="width:${a.progress||60}%"></i></div></div><button class="review">${compact?a.statusShort:'Revisar'} ›</button></div>`}
function healthCard(){const s=state.summary;return `<section class="health card"><div><h2>Salud general</h2><div class="donut"><span>${s.health}%<em>Buena</em></span></div></div><div><div class="chart-title">Evolución de salud</div><div class="chart-sub">Últimos 6 meses · basado en mantenciones y documentos</div><div class="line-chart"><svg viewBox="0 0 320 92" preserveAspectRatio="none"><defs><linearGradient id="fill" x1="0" x2="0" y1="0" y2="1"><stop stop-color="#28e7c7" stop-opacity=".33"/><stop offset="1" stop-color="#28e7c7" stop-opacity="0"/></linearGradient></defs><path d="M12 64 C42 50,52 50,70 52 C95 55,98 28,120 34 C150 43,147 74,174 61 C196 52,205 47,226 53 C249 58,255 32,280 29 C300 27,302 17,314 13 L314 86 L12 86 Z" fill="url(#fill)"/><path d="M12 64 C42 50,52 50,70 52 C95 55,98 28,120 34 C150 43,147 74,174 61 C196 52,205 47,226 53 C249 58,255 32,280 29 C300 27,302 17,314 13" fill="none" stroke="#28e7c7" stroke-width="4" stroke-linecap="round"/><g fill="#28e7c7"><circle cx="12" cy="64" r="4"/><circle cx="70" cy="52" r="4"/><circle cx="120" cy="34" r="4"/><circle cx="174" cy="61" r="4"/><circle cx="226" cy="53" r="4"/><circle cx="280" cy="29" r="4"/><circle cx="314" cy="13" r="5"/></g><g fill="#aeb9ce" font-size="12" font-weight="800"><text x="20" y="91">MAY</text><text x="74" y="91">JUN</text><text x="131" y="91">JUL</text><text x="185" y="91">AGO</text><text x="244" y="91">SEP</text><text x="292" y="91">OCT</text></g></svg></div></div><div class="legend"><span class="teal"><i class="bullet"></i><b>${s.ok}</b> al día</span><span class="yellow"><i class="bullet"></i><b>${s.upcoming}</b> próximas</span><span class="red"><i class="bullet"></i><b>${s.expired}</b> vencidas</span><span class="gray"><i class="bullet"></i><b>${s.unknown}</b> sin dato</span></div></section>`}
function metrics(){const s=state.summary;return `<div class="metrics"><div class="metric"><div class="mi">▦</div><span class="muted">Próximo</span><b>${s.nextDays}</b><span>días</span></div><div class="metric"><div class="mi">⌁</div><span class="muted">Km. estimado</span><b>${fmt(s.kmRemaining)}</b><span>km</span></div><div class="metric"><div class="mi">▤</div><span class="muted">Eventos</span><b>${s.eventsMonth}</b><span>mes</span></div><div class="metric"><div class="mi">⌘</div><span class="muted">Servicios</span><b>${s.services}</b><span>historial</span></div></div>`}
function renderHome(){const v=state.vehicle;$('#app').innerHTML=`${topbar('',true)}<section class="hero card"><div><h1>${v.name}</h1><div class="sub">${v.year} · ${v.plate}</div><div class="hero-meta"><p class="label">Kilometraje actual</p><div class="km">${fmt(v.km)} km</div><div class="muted">Actualizado hoy, ${v.updated}</div></div></div>${carSvg()}</section>${kpis()}${healthCard()}${metrics()}<div class="section-head"><h2>Alertas importantes</h2><a onclick="go('maintenance')">Ver todas ›</a></div><div class="alert-list">${state.alerts.slice(0,3).map(a=>alertCard(a)).join('')}</div>`}
function renderMaintenance(){const s=state.summary;$('#app').innerHTML=`${topbar('MANTENCIONES')}${kpis()}<div class="section-head" style="margin-top:6px"><h2>Sistemas del vehículo</h2></div><div class="subtitle">Toca una categoría para ver el detalle</div><div class="category-grid">${state.categories.map(c=>`<button class="cat ${colorClass(c.color)}"><div class="cat-top"><span class="cat-ico">${c.icon}</span><span class="cat-count">${c.count}</span></div><h3>${c.name}</h3><p>${c.note}</p></button>`).join('')}</div><div class="chips"><button class="chip active">Todos</button><button class="chip">Pendientes ·</button><button class="chip">Próximas ·</button><button class="chip">OK ·</button></div><div class="section-head"><h2>Requieren atención</h2><a>Ver todas ›</a></div><div class="alert-list">${[state.alerts[0],state.alerts[1],state.alerts[3]].map(a=>alertCard(a,true)).join('')}</div>`}
function renderAgenda(){const s=state.summary;$('#app').innerHTML=`${topbar('AGENDA')}<div class="agenda-summary"><div class="mini teal"><div class="top"><span>Hoy</span><span>▦</span></div><b>1</b><span>evento</span></div><div class="mini yellow"><div class="top"><span>Próx.<br>7 días</span><span>◷</span></div><b>3</b><span>eventos</span></div><div class="mini teal"><div class="top"><span>Este mes</span><span>▦</span></div><b>${s.eventsMonth}</b><span>eventos</span></div><div class="mini gray"><div class="top"><span>Docs</span><span>▤</span></div><b>4</b><span>por vencer</span></div></div><div class="date-strip"><div class="date-pill active"><span>MIÉ</span><b>24</b><span>JUN</span></div><div class="date-pill"><span>JUE</span><b>25</b><span>JUN</span></div><div class="date-pill"><span>VIE</span><b>26</b><span>JUN</span></div><div class="date-pill"><span>DOM</span><b>28</b><span>JUN</span></div><div class="date-pill"><span>JUE</span><b>31</b><span>JUL</span></div></div><section class="highlight card"><div class="alert-icon teal">🛢️</div><div><div class="label teal">Siguiente hito</div><h2 style="margin:6px 0 2px">Aceite motor</h2><div class="muted">Mantención · Motor</div><b>En 4 días · Vence 28/06/2026</b></div><span class="badge yellow">Próxima</span></section><div class="section-head"><h2>Próximos eventos</h2><a>Ver todos ›</a></div><div class="alert-list">${state.agenda.map(e=>`<div class="event-card ${colorClass(e.color)}"><div class="date-block"><span>${e.date.split(' ')[0]}</span><b>${e.date.split(' ')[1]}</b></div><div class="alert-icon">${e.icon}</div><div><h3 style="margin:0 0 2px;font-size:15px">${e.title}</h3><div class="muted" style="font-size:11px">${e.type}</div><p style="margin:2px 0;color:${e.color==='red'?'var(--red)':'var(--muted2)'};font-size:11px">${e.detail}</p></div><span class="badge">${e.badge}</span></div>`).join('')}</div><div class="section-head"><h2>Documentos</h2><a>Ver todos ›</a></div><div class="docs-grid">${state.docs.map(d=>`<div class="doc ${colorClass(d.color)}"><div class="doc-ico">${d.icon}</div><div><b>${d.title}</b><div class="muted">${d.date}</div></div><span class="badge">${d.status}</span></div>`).join('')}</div>`}
function renderAdd(){ $('#app').innerHTML=`${topbar('AGREGAR')}<section class="card empty-page"><h1>Agregar registro</h1><p class="muted">Crea una mantención, documento, gasto o recordatorio.</p><button class="primary">＋ Nueva mantención</button><br><button class="primary">＋ Nuevo documento</button></section>` }
function renderMore(){ $('#app').innerHTML=`${topbar('MÁS')}<section class="card empty-page"><h1>Más opciones</h1><p class="muted">Reportes, exportar datos, configuración, respaldo y actualizaciones.</p><button class="primary" onclick="checkUpdates()">Buscar actualización</button></section>` }
function go(page){state.page=page;$$('.nav-item').forEach(n=>n.classList.toggle('active',n.dataset.page===page));render()}
function render(){ if(state.page==='home')renderHome(); else if(state.page==='maintenance')renderMaintenance(); else if(state.page==='agenda')renderAgenda(); else if(state.page==='add')renderAdd(); else renderMore(); window.scrollTo(0,0)}
function checkUpdates(){try{if(window.AndroidBridge&&AndroidBridge.checkGithubUpdates)AndroidBridge.checkGithubUpdates();else alert('Actualizaciones disponibles desde GitHub Releases.')}catch(e){alert('No se pudo consultar actualización.')}}
window.appBack=()=>{ if(state.page==='home') return 'exit'; go('home'); return 'handled'; };
$$('[data-page]').forEach(b=>b.addEventListener('click',()=>go(b.dataset.page)));
render();
</script>
</body>
</html>

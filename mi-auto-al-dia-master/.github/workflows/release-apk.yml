name: release-apk

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Configurar Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Configurar Android SDK
        uses: android-actions/setup-android@v3

      - name: Instalar SDK necesario
        run: sdkmanager 'platforms;android-35' 'build-tools;35.0.0'

      - name: Configurar Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'

      - name: Verificar secretos de firma
        env:
          AUTO_KEYSTORE_BASE64: ${{ secrets.AUTO_KEYSTORE_BASE64 }}
          AUTO_KEYSTORE_PASSWORD: ${{ secrets.AUTO_KEYSTORE_PASSWORD }}
          AUTO_KEY_ALIAS: ${{ secrets.AUTO_KEY_ALIAS }}
        run: |
          test -n "$AUTO_KEYSTORE_BASE64" || (echo "Falta el secret AUTO_KEYSTORE_BASE64" && exit 1)
          test -n "$AUTO_KEYSTORE_PASSWORD" || (echo "Falta el secret AUTO_KEYSTORE_PASSWORD" && exit 1)
          test -n "$AUTO_KEY_ALIAS" || (echo "Falta el secret AUTO_KEY_ALIAS" && exit 1)

      - name: Crear y validar archivo de firma
        env:
          AUTO_KEYSTORE_BASE64: ${{ secrets.AUTO_KEYSTORE_BASE64 }}
          AUTO_KEYSTORE_PASSWORD: ${{ secrets.AUTO_KEYSTORE_PASSWORD }}
          AUTO_KEY_ALIAS: ${{ secrets.AUTO_KEY_ALIAS }}
        run: |
          printf '%s' "$AUTO_KEYSTORE_BASE64" | tr -d '\r\n ' | base64 --decode > app/auto-release.jks
          test -s app/auto-release.jks || (echo "No se pudo crear app/auto-release.jks" && exit 1)
          keytool -list -keystore app/auto-release.jks -storepass "$AUTO_KEYSTORE_PASSWORD" -alias "$AUTO_KEY_ALIAS" >/dev/null

      - name: Compilar APK release sin firmar
        run: gradle :app:assembleRelease --no-daemon

      - name: Firmar APK release
        env:
          AUTO_KEYSTORE_PASSWORD: ${{ secrets.AUTO_KEYSTORE_PASSWORD }}
          AUTO_KEY_ALIAS: ${{ secrets.AUTO_KEY_ALIAS }}
        run: |
          mkdir -p release
          UNSIGNED_APK="$(find app/build/outputs/apk/release -name '*release*.apk' | head -n 1)"
          test -n "$UNSIGNED_APK" || (echo "No se encontro APK release para firmar" && exit 1)
          ZIPALIGN="$ANDROID_HOME/build-tools/35.0.0/zipalign"
          APKSIGNER="$ANDROID_HOME/build-tools/35.0.0/apksigner"
          "$ZIPALIGN" -p -f 4 "$UNSIGNED_APK" release/MiAutoAlDia-${GITHUB_REF_NAME}-aligned.apk
          "$APKSIGNER" sign \
            --ks app/auto-release.jks \
            --ks-pass pass:"$AUTO_KEYSTORE_PASSWORD" \
            --ks-key-alias "$AUTO_KEY_ALIAS" \
            --key-pass pass:"$AUTO_KEYSTORE_PASSWORD" \
            --out release/MiAutoAlDia-${GITHUB_REF_NAME}.apk \
            release/MiAutoAlDia-${GITHUB_REF_NAME}-aligned.apk
          "$APKSIGNER" verify --verbose release/MiAutoAlDia-${GITHUB_REF_NAME}.apk

      - name: Publicar APK en GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          files: release/MiAutoAlDia-${{ github.ref_name }}.apk
